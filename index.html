// ── Atualiza visibilidade das células de data condicionais ─────────
function acUpdateDateCells(proto) {
  var a  = getAcompRec(proto);
  var st = a.status || '';
  var row = document.querySelector('.acomp-tbl tbody tr[data-proto="' + CSS.escape(proto) + '"]');
  if (!row) return;
  row.querySelectorAll('[data-cond]').forEach(function(td) {
    var cond = td.getAttribute('data-cond');
    var active = (cond === st);
    td.style.opacity = active ? '1' : '0.3';
    var inp = td.querySelector('input');
    if (inp) {
      inp.disabled = !active;
      inp.style.background = active ? 'var(--surface2)' : 'var(--surface3)';
    }
  });
}

// ── Comentários ───────────────────────────────────────────────────
function acComentCount(proto) {
  var inp = document.querySelector('.acomp-tbl [data-proto="' + CSS.escape(proto) + '"] .ac-coment-inp');
  var ctr = document.querySelector('.acomp-tbl [data-proto="' + CSS.escape(proto) + '"] .ac-coment-ctr');
  if (!inp || !ctr) return;
  var rem = ACOMP_COMENT_LIMIT - inp.value.length;
  ctr.textContent = rem + ' car. restantes';
  ctr.style.color = rem < 30 ? '#84231a' : rem < 80 ? '#d97706' : 'var(--dim)';
}

function acSalvar(proto) {
  var inp  = document.querySelector('.acomp-tbl [data-proto="' + CSS.escape(proto) + '"] .ac-coment-inp');
  var hist = document.querySelector('.acomp-tbl [data-proto="' + CSS.escape(proto) + '"] .ac-coment-hist');
  if (!inp || !inp.value.trim()) return;
  var a     = getAcompRec(proto);
  var texto = inp.value.trim().substring(0, ACOMP_COMENT_LIMIT);
  var agora = new Date().toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  a.historico.unshift({texto: texto, data: agora});
  inp.value = '';
  acComentCount(proto);
  if (hist) hist.innerHTML = acRenderHist(a.historico);
  acPersistir(proto);
}

function acRenderHist(hist) {
  if (!hist || !hist.length) return '';
  var html = hist.slice(0, 3).map(function(h, i) {
    return '<div class="ac-coment-entry">'
      + '<div class="ac-coment-text" style="' + (i===0?'color:var(--text);font-weight:500':'') + '">' + h.texto + '</div>'
      + '<div class="ac-coment-meta">' + h.data + '</div></div>';
  }).join('');
  if (hist.length > 3) {
    html += '<div style="font-size:9px;color:var(--dim);text-align:center;margin-top:2px">+'
          + (hist.length-3) + ' comentário' + (hist.length-3>1?'s':'') + ' anteriores</div>';
  }
  return html;
}

// ── Estado dos filtros da tabela de acompanhamento ────────────────
var AC_FILTER = {
  protocolo: '', iniciativa: '', objetivo: '',
  nivel: '', enquadramento: '', sponsor: '', lider: '',
  pmp: '', vertical: '', status: '', fase: '',
  dtInicioFrom: '', dtInicioTo: '',
  dtPrevistaFrom: '', dtPrevistaTo: '',
  dtConclusaoFrom: '', dtConclusaoTo: '',
  dtCancelamentoFrom: '', dtCancelamentoTo: '',
  progressoMin: '', progressoMax: ''
};

function acGetFilterOptions(rows, field) {
  var set = {};
  rows.forEach(function(r) {
    var proto = String(r[C.protocolo]||r[C.id]||'').trim();
    var val = '';
    if (field === 'nivel') val = String(r[C.nivelEst]||'').split('(')[0].trim();
    else if (field === 'enquadramento') val = String(r[C.enquadramento]||'').trim();
    else if (field === 'sponsor') { var a = getAcompRec(proto); (a.sponsor||[]).forEach(function(s){ if(s) set[s]=1; }); return; }
    else if (field === 'lider') { var a2 = getAcompRec(proto); (a2.lider||[]).forEach(function(s){ if(s) set[s]=1; }); return; }
    else if (field === 'pmp') { var a3 = getAcompRec(proto); val = a3.pmp||''; }
    else if (field === 'vertical') { var a4 = getAcompRec(proto); (a4.vertical||[]).forEach(function(s){ if(s) set[s]=1; }); return; }
    else if (field === 'status') { var a5 = getAcompRec(proto); val = a5.status||'Não iniciado'; }
    else if (field === 'fase') { var a6 = getAcompRec(proto); val = a6.fase||''; }
    if (val) set[val] = 1;
  });
  return Object.keys(set).sort();
}

function acApplyFilters(rows) {
  var f = AC_FILTER;
  return rows.filter(function(r) {
    var proto  = String(r[C.protocolo]||r[C.id]||'').trim();
    var nome   = String(r[C.nome]||'').toLowerCase();
    var nivel  = String(r[C.nivelEst]||'').split('(')[0].trim();
    var enq    = String(r[C.enquadramento]||'').trim();
    var score  = parseFloat(r[C.scoreEst]) || 0;
    var a      = getAcompRec(proto);
    var status = a.status || 'Não iniciado';
    var fase   = a.fase   || '';
    var pmp    = a.pmp    || '';
    var spArr  = a.sponsor  || [];
    var liArr  = a.lider    || [];
    var veArr  = a.vertical || [];
    var prog   = a.progresso || 0;

    // Protocolo (busca parcial, case-insensitive)
    if (f.protocolo && proto.toLowerCase().indexOf(f.protocolo.toLowerCase()) === -1) return false;
    // Iniciativa
    if (f.iniciativa && nome.indexOf(f.iniciativa.toLowerCase()) === -1) return false;
    // Score range
    if (f.scoreMin !== '' && score < parseFloat(f.scoreMin)) return false;
    if (f.scoreMax !== '' && score > parseFloat(f.scoreMax)) return false;
    if (f.objetivo && !(a.objetivo||'').toLowerCase().includes(f.objetivo.toLowerCase())) return false;
    // Nível
    if (f.nivel && nivel !== f.nivel) return false;
    // Enquadramento
    if (f.enquadramento && enq !== f.enquadramento) return false;
    // Sponsor
    if (f.sponsor && spArr.indexOf(f.sponsor) === -1) return false;
    // Líder
    if (f.lider && liArr.indexOf(f.lider) === -1) return false;
    // PMP
    if (f.pmp && pmp !== f.pmp) return false;
    // Vertical
    if (f.vertical && veArr.indexOf(f.vertical) === -1) return false;
    // Status
    if (f.status && status !== f.status) return false;
    // Fase
    if (f.fase && fase !== f.fase) return false;
    // Progresso range
    if (f.progressoMin !== '' && prog < parseFloat(f.progressoMin)) return false;
    if (f.progressoMax !== '' && prog > parseFloat(f.progressoMax)) return false;

    // Datas — helper
    function dtOk(dtStr, from, to) {
      if (!from && !to) return true;
      if (!dtStr) return false;
      var d = new Date(dtStr);
      if (isNaN(d)) return false;
      if (from && d < new Date(from)) return false;
      if (to   && d > new Date(to))   return false;
      return true;
    }
    if (!dtOk(a.dtInicio,      f.dtInicioFrom,      f.dtInicioTo))      return false;
    if (!dtOk(a.dtPrevista,    f.dtPrevistaFrom,    f.dtPrevistaTo))    return false;
    if (!dtOk(a.dtConclusao,   f.dtConclusaoFrom,   f.dtConclusaoTo))   return false;
    if (!dtOk(a.dtCancelamento,f.dtCancelamentoFrom,f.dtCancelamentoTo))return false;

    return true;
  });
}

function acAttachRowListeners(tblBodyEl) {
  var tbl = tblBodyEl;
  if (!tbl) {
    var mc2 = document.getElementById('main-content');
    tbl = mc2 ? mc2.querySelector('.acomp-tbl tbody') : null;
  }
  if (!tbl) return;
  // Click para abrir modal (ignora controles interativos)
  var tblWrap = tbl.closest('.acomp-tbl');
  if (tblWrap && !tblWrap._clickBound) {
    tblWrap._clickBound = true;
    tblWrap.addEventListener('click', function(e) {
      var _tr = e.target.closest('tr[data-proto]');
      if (!_tr || e.target.closest('select,input,button,textarea,.ac-ms-wrap,.ac-coment-wrap')) return;
      var _p = _tr.getAttribute('data-proto');
      for (var _i = 0; _i < ROWS.length; _i++) {
        if (String(ROWS[_i][C.protocolo]||ROWS[_i][C.id]||'').trim() === _p) { openModal(_i); return; }
      }
    });
  }
  tbl.querySelectorAll('tr[data-proto]').forEach(function(tr) {
    var proto = tr.getAttribute('data-proto');
    var a = getAcompRec(proto);
    var selSt = tr.querySelector('.ac-sel-status');
    if (selSt) selSt.addEventListener('change', function(){ a.status=this.value; acUpdateDateCells(proto); acRefreshAll(); acPersistir(proto); });
    var selFa = tr.querySelector('.ac-sel-fase');
    if (selFa) selFa.addEventListener('change', function(){ a.fase=this.value; acRefreshAll(); acPersistir(proto); });
    var selPmp = tr.querySelector('.ac-sel-pmp');
    if (selPmp) selPmp.addEventListener('change', function(){ a.pmp=this.value; acRefreshAll(); acPersistir(proto); });
    var dtI = tr.querySelector('.ac-dt-inicio');  if(dtI)  dtI.addEventListener('change',function(){ a.dtInicio=this.value;     acRefreshAll(); acPersistir(proto); });
    var dtPv= tr.querySelector('.ac-dt-prevista'); if(dtPv) dtPv.addEventListener('change',function(){ a.dtPrevista=this.value;  acPersistir(proto); });
    var dtPa= tr.querySelector('.ac-dt-pausa');   if(dtPa) dtPa.addEventListener('change',function(){ a.dtPausa=this.value;      acRefreshAll(); acPersistir(proto); });
    var dtRe= tr.querySelector('.ac-dt-retomada');if(dtRe) dtRe.addEventListener('change',function(){ a.dtRetomada=this.value;   acRefreshAll(); acPersistir(proto); });
    var dtCo= tr.querySelector('.ac-dt-conclusao');if(dtCo)dtCo.addEventListener('change',function(){ a.dtConclusao=this.value;  acRefreshAll(); acPersistir(proto); });

    var st=a.status||'Não iniciado', fa=a.fase||'Sem fase';
    var en=String(r[C.enquadramento]||'—'), ni=String(r[C.nivelEst]||'—').split('(')[0].trim();
    byStatus[st]=(byStatus[st]||0)+1; byFase[fa]=(byFase[fa]||0)+1;
    byEnq[en]=(byEnq[en]||0)+1; byNivel[ni]=(byNivel[ni]||0)+1;

    return '<div class="acf-range"><input id="'+idFrom+'" class="acf-dt" type="date" onchange="acAplicarFiltros()">'

  h+='<div id="ac-tabela-wrap"><div class="acomp-tbl-wrap"><div class="acomp-scroll-top" id="ac-scroll-top"><div class="acomp-scroll-top-inner" id="ac-scroll-top-inner"></div></div><div class="acomp-scroll-body" id="ac-scroll-body"><table class="acomp-tbl"><thead>';
  // Linha 1 — labels
  h+='<tr>';
  ['Protocolo','Iniciativa','Objetivo','Nível','Enquadramento','Sponsor','Líder de Negócio','PMP','Vertical','Status','Fase',
   'Dt. Início','Dt. Prevista','Dt. Pausa ¹','Dt. Retomada ¹',
   'Dt. Conclusão ²','Dt. Cancelamento ³','Progresso','Ponto de Controle'].forEach(function(col){h+='<th>'+col+'</th>';});
  h+='</tr>';
  // Linha 2 — filtros inline
  h+='<tr class="acf-row">';
  h+='<th>'+fTxt('acf-protocolo','Buscar...')+'</th>';
  h+='<th>'+fTxt('acf-iniciativa','Buscar...')+'</th>';
  h+='<th>'+fTxt('acf-objetivo','Buscar...')+'</th>';
  h+='<th>'+fSel('acf-nivel','nivel','Todos')+'</th>';
  h+='<th>'+fSel('acf-enq','enquadramento','Todos')+'</th>';
  h+='<th>'+fSel('acf-sponsor','sponsor','Todos')+'</th>';
  h+='<th>'+fSel('acf-lider','lider','Todos')+'</th>';
  h+='<th>'+fSel('acf-pmp','pmp','Todos')+'</th>';
  h+='<th>'+fSel('acf-vertical','vertical','Todas')+'</th>';
  h+='<th>'+fSel('acf-status','status','Todos')+'</th>';
  h+='<th>'+fSel('acf-fase','fase','Todas')+'</th>';
  h+='<th>'+fDt('acf-dtinicio-from','acf-dtinicio-to')+'</th>';
  h+='<th>'+fDt('acf-dtprevista-from','acf-dtprevista-to')+'</th>';
  h+='<th></th>'; // Dt. Pausa — sem filtro (condicional)
  h+='<th></th>'; // Dt. Retomada — sem filtro (condicional)
  h+='<th>'+fDt('acf-dtconclusao-from','acf-dtconclusao-to')+'</th>';
  h+='<th>'+fDt('acf-dtcancelamento-from','acf-dtcancelamento-to')+'</th>';
  h+='<th>'+fNum('acf-prog-min','acf-prog-max')+'</th>';
  h+='<th><button class="acf-clear-btn" onclick="acResetFilters()" title="Limpar filtros">✕ Limpar</button></th>';
  h+='</tr>';
  h+='</thead><tbody>';

  rows.forEach(function(r){
    var proto=String(r[C.protocolo]||r[C.id]||'—').trim();
    var nome=String(r[C.nome]||'—');
    var enqd=String(r[C.enquadramento]||'—');
    var nivel=String(r[C.nivelEst]||'—').split('(')[0].trim();
    var score=r[C.scoreEst]||'—';
    var a=getAcompRec(proto);
    var prog=a.progresso||0, pc=acProgColor(prog);
    var stVal=a.status||'', faVal=a.fase||'';
    var isPausa=stVal==='Pausado',isConc=stVal==='Concluído',isCancel=stVal==='Cancelado';
    // IDs únicos para os multi-selects (usa índice seguro baseado no proto)
    var uidSafe=proto.replace(/[^a-zA-Z0-9]/g,'_');
    h+='<tr data-proto="'+proto.replace(/"/g,'&quot;')+'" style="cursor:pointer" onmouseover="this.style.background=\'var(--surface2)\'" onmouseout="this.style.background=\'\'\'">';
    h+='<td style="color:var(--red);font-weight:600;font-family:var(--mono);font-size:11px">'+proto+'</td>';
    h+='<td style="font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+nome.replace(/"/g,'&quot;')+'">'+(nome.length>38?nome.substring(0,38)+'…':nome)+'</td>';
    var objAtual=a.objetivo||'';
    h+='<td style="min-width:180px"><div class="ac-coment-wrap">'
      +'<textarea class="ac-coment-inp ac-objetivo-inp" rows="2" maxlength="300" placeholder="Descreva o objetivo...">'+objAtual.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</textarea>'
      +'<div class="ac-coment-footer"><span class="ac-objetivo-ctr">'+(300-objAtual.length)+' car. restantes</span><button class="ac-coment-btn ac-objetivo-btn">Salvar</button></div>'
      +(objAtual?'<div class="ac-objetivo-atual" style="font-size:10px;color:var(--muted);padding:4px 2px;line-height:1.4;border-top:1px solid var(--border);margin-top:4px">'+objAtual.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>':'')
      +'</div></td>';
    h+='<td><span style="font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(132,35,26,.08);color:var(--red)">'+nivel+'</span></td>';
    h+='<td><span class="badge '+enqBadge(enqd)+'">'+enqd+'</span></td>';
    // Sponsor — multi-select checkbox
    h+='<td>'+acMsHtml(uidSafe+'_sp', ACOMP_SPONSOR_OPTS,  a.sponsor||[],  'sponsor',  proto)+'</td>';
    // Líder de Negócio — multi-select checkbox
    h+='<td>'+acMsHtml(uidSafe+'_li', ACOMP_LIDER_OPTS,    a.lider||[],    'lider',    proto)+'</td>';
    // PMP — select simples
    h+='<td>'+acSingleSelHtml('ac-sel-pmp', ACOMP_PMP_OPTS, a.pmp||'')+'</td>';
    // Vertical — multi-select checkbox
    h+='<td>'+acMsHtml(uidSafe+'_ve', ACOMP_VERTICAL_OPTS, a.vertical||[], 'vertical', proto)+'</td>';
    h+='<td><select class="sel-acomp ac-sel-status"><option value="">Selecionar...</option>'+ACOMP_STATUS_OPTS.map(function(o){return '<option value="'+o+'"'+(stVal===o?' selected':'')+'>'+o+'</option>';}).join('')+'</select></td>';
    h+='<td><select class="sel-acomp ac-sel-fase"><option value="">Selecionar...</option>'+ACOMP_FASE_OPTS.map(function(o){return '<option value="'+o+'"'+(faVal===o?' selected':'')+'>'+o+'</option>';}).join('')+'</select></td>';
    h+='<td><input type="date" class="ac-dt-inp ac-dt-inicio" value="'+(a.dtInicio||'')+'"></td>';
    h+='<td><input type="date" class="ac-dt-inp ac-dt-prevista" value="'+(a.dtPrevista||'')+'"></td>';
    h+='<td data-cond="Pausado" style="'+(isPausa?'':'opacity:0.3')+'"><input type="date" class="ac-dt-inp ac-dt-pausa" value="'+(a.dtPausa||'')+'"'+(isPausa?'':' disabled style="background:var(--surface3)"')+'></td>';
    h+='<td data-cond="Pausado" style="'+(isPausa?'':'opacity:0.3')+'"><input type="date" class="ac-dt-inp ac-dt-retomada" value="'+(a.dtRetomada||'')+'"'+(isPausa?'':' disabled style="background:var(--surface3)"')+'></td>';
    h+='<td data-cond="Concluído" style="'+(isConc?'':'opacity:0.3')+'"><input type="date" class="ac-dt-inp ac-dt-conclusao" value="'+(a.dtConclusao||'')+'"'+(isConc?'':' disabled style="background:var(--surface3)"')+'></td>';
    h+='<td data-cond="Cancelado" style="'+(isCancel?'':'opacity:0.3')+'"><input type="date" class="ac-dt-inp ac-dt-cancelamento" value="'+(a.dtCancelamento||'')+'"'+(isCancel?'':' disabled style="background:var(--surface3)"')+'></td>';
    h+='<td style="min-width:110px"><div class="prog-wrap"><input type="number" min="0" max="100" value="'+prog+'" class="prog-num ac-prog-inp" style="color:'+pc+'"><span style="font-size:11px;font-weight:700;color:'+pc+'">%</span><div class="prog-bar-bg"><div class="prog-bar-fill ac-prog-bar" style="width:'+prog+'%;background:'+pc+'"></div></div></div></td>';
    h+='<td><div class="ac-coment-wrap"><textarea class="ac-coment-inp" rows="2" maxlength="'+ACOMP_COMENT_LIMIT+'" placeholder="Registre o status atual..."></textarea><div class="ac-coment-footer"><span class="ac-coment-ctr">'+ACOMP_COMENT_LIMIT+' car. restantes</span><button class="ac-coment-btn">Registrar</button></div><div class="ac-coment-hist">'+acRenderHist(a.historico)+'</div></div></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div></div>';
  h+='<div style="font-size:10px;color:var(--dim);margin-top:10px">¹ Disponível apenas com status Pausado &nbsp;·&nbsp; ² Disponível apenas com status Concluído &nbsp;·&nbsp; ³ Disponível apenas com status Cancelado</div>';
  h+='<div style="display:flex;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)"><button onclick="exportAcompExcel()" style="display:flex;align-items:center;gap:8px;padding:10px 20px;background:#16a34a;color:white;border:0;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer" onmouseover="this.style.background=\'#15803d\'" onmouseout="this.style.background=\'#16a34a\'">⬇️ Exportar para Excel</button></div>';

  mc.innerHTML=h;

  // ── Event listeners ───────────────────────────────────────────────
  acAttachRowListeners(null);

  // ── Sincroniza scroll horizontal topo ↔ corpo ─────────────────────
  (function() {
    var top  = document.getElementById('ac-scroll-top');
    var body = document.getElementById('ac-scroll-body');
    var inn  = document.getElementById('ac-scroll-top-inner');
    if (!top || !body || !inn) return;

    // Ajusta largura do espelho para disparar barra de scroll
    function syncWidth() {
      var tbl = body.querySelector('.acomp-tbl');
      if (tbl) inn.style.width = tbl.scrollWidth + 'px';
    }
    syncWidth();
    // Re-sincroniza se a tabela mudar de tamanho
    if (window.ResizeObserver) {
      new ResizeObserver(syncWidth).observe(body);
    }

    var syncing = false;
    top.addEventListener('scroll', function() {
      if (syncing) return; syncing = true;
      body.scrollLeft = top.scrollLeft;
      syncing = false;
    });
    body.addEventListener('scroll', function() {
      if (syncing) return; syncing = true;
      top.scrollLeft = body.scrollLeft;
      syncing = false;
    });
  })();

  // ── Gráficos ──────────────────────────────────────────────────────
  acBuildAllCharts(rows, tot, byStatus, byFase, byEnq, byNivel, namesStatus, namesFase, namesEnq, namesNivel, pmpKeys, byPMP, namesPMP);
  acBuildRoadmap(rows);
}

function acBuildAllCharts(rows, tot, byStatus, byFase, byEnq, byNivel, namesStatus, namesFase, namesEnq, namesNivel, pmpKeys, byPMP, namesPMP) {
  Chart.defaults.font.family = "'Inter','Segoe UI',sans-serif";
  Chart.defaults.font.size   = 10;
  Chart.defaults.color       = '#6b7a99';

  var tooltipOpts = {
    backgroundColor:'rgba(10,14,26,.95)', titleColor:'#fff',
    bodyColor:'rgba(255,255,255,.82)', borderColor:'rgba(255,255,255,.1)',
    borderWidth:1, padding:14, cornerRadius:12,
    displayColors:true, boxWidth:9, boxHeight:9, boxPadding:4
  };

  var scaleOpts = {
    y:{beginAtZero:true, grid:{color:'rgba(0,0,0,.04)',drawBorder:false}, ticks:{font:{size:9},color:'#9ba5bb',stepSize:1}, border:{display:false}},
    x:{grid:{display:false}, ticks:{font:{size:9},color:'#9ba5bb'}, border:{display:false}}
  };

  // ── Plugin label central ──────────────────────────────────────────
  var centerLabelPlugin = {
    id:'centerLabel',
    afterDraw: function(chart) {
      var id = chart.canvas.id+'-lbl';
      var el = document.getElementById(id);
      if (!el) return;
      var active = chart.getActiveElements();
      var total  = chart.data.datasets[0].data.reduce(function(a,b){return a+b;},0);
      if (active.length > 0) {
        var idx = active[0].index;
        el.children[0].textContent = chart.data.datasets[0].data[idx];
        var lbl = chart.data.labels[idx]||'';
        el.children[1].textContent = lbl.length>10 ? lbl.substring(0,10)+'\u2026' : lbl;
      } else {
        el.children[0].textContent = total;
        el.children[1].textContent = 'total';
      }
    }
  };

  // ── Plugin sombra suave nos donuts ──────────────────────────────────
  var glowPlugin = {
    id:'glowPlugin',
    beforeDatasetDraw: function(chart, args) {
      if (chart.config.type !== 'doughnut') return;
      chart.ctx.save();
      chart.ctx.shadowBlur    = 10;
      chart.ctx.shadowOffsetX = 0;
      chart.ctx.shadowOffsetY = 3;
      chart.ctx.shadowColor   = 'rgba(0,0,0,.12)';
    },
    afterDatasetDraw: function(chart) {
      if (chart.config.type !== 'doughnut') return;
      chart.ctx.restore();
    }
  };

  // ── Plugin moderno: sombra suave + highlight topo ──────────────────
  var bar3DPlugin = {
    id:'bar3D',
    afterDatasetDraw: function(chart, args) {
      if (chart.config.type !== 'bar') return;
      var ctx = chart.ctx;
      var isH = chart.config.options && chart.config.options.indexAxis === 'y';
      var meta = chart.getDatasetMeta(args.index);
      if (!meta || meta.hidden) return;
      var ds = chart.data.datasets[args.index];
      meta.data.forEach(function(bar, bi) {
        var bc = Array.isArray(ds.backgroundColor) ? ds.backgroundColor[bi] : ds.backgroundColor;
        if (!bc || typeof bc !== 'string' || !bc.match(/^#[0-9a-f]{6}$/i)) return;
        var r=parseInt(bc.slice(1,3),16), g=parseInt(bc.slice(3,5),16), b2=parseInt(bc.slice(5,7),16);
        ctx.save();
        if (isH) {
          var bx=bar.x, by=bar.y, bh=(bar.height||20), bBase=bar.base;
          // Highlight sutil no topo da barra
          var grd = ctx.createLinearGradient(bBase, by, bx, by);
          grd.addColorStop(0, 'rgba(255,255,255,.18)');
          grd.addColorStop(0.5, 'rgba(255,255,255,.06)');
          grd.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.roundRect(bBase, by-bh/2, bx-bBase, bh/2.5, [0,4,0,0]);
          ctx.fill();
          // Sombra inferior delicada
          ctx.fillStyle = 'rgba(0,0,0,.06)';
          ctx.beginPath();
          ctx.roundRect(bBase+2, by+bh/2-3, bx-bBase-2, 3, [0,0,4,0]);
          ctx.fill();
        } else {
          var bx2=bar.x, by2=bar.y, bw=(bar.width||20), bBase2=bar.base;
          var h2=bBase2-by2;
          // Highlight lateral esquerdo (reflexo de luz)
          var grd2 = ctx.createLinearGradient(bx2-bw/2, by2, bx2+bw/2, by2);
          grd2.addColorStop(0, 'rgba(255,255,255,.22)');
          grd2.addColorStop(0.3, 'rgba(255,255,255,.08)');
          grd2.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = grd2;
          ctx.beginPath();
          ctx.roundRect(bx2-bw/2, by2, bw/2, h2, [4,0,0,4]);
          ctx.fill();
          // Linha highlight no topo
          ctx.fillStyle = 'rgba(255,255,255,.35)';
          ctx.beginPath();
          ctx.roundRect(bx2-bw/2+2, by2, bw-4, 2, [2,2,0,0]);
          ctx.fill();
          // Sombra suave na base
          ctx.fillStyle = 'rgba(0,0,0,.07)';
          ctx.beginPath();
          ctx.roundRect(bx2-bw/2+2, bBase2-3, bw-4, 3, [0,0,3,3]);
          ctx.fill();
        }
        ctx.restore();
      });
    }
  };

  // ── Helper: cor mais clara / mais escura ──────────────────────────
  function lighten(hex, f) {
    var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return 'rgba('+Math.min(255,Math.round(r*f))+','+Math.min(255,Math.round(g*f))+','+Math.min(255,Math.round(b*f))+',1)';
  }

  // ── mkD: donut com gradiente interno via plugin afterDraw ─────────
  function mkD(id,key,labels,data,colors,namesMap){
    var el=document.getElementById(id); if(!el)return;
    var clickMap={'k-enq':'enq','k-st':'status','k-ni':'nivel','k-ni2':'nivel','k-fa':'fase','k-fase':'fase'};
    var cType=clickMap[key]||null;
    var onCk=cType?function(evt,elems){if(elems&&elems.length>0){var lbl=ACOMP_CHARTS[key].data.labels[elems[0].index];if(lbl)acOpenModalFiltro(cType,lbl);}}:undefined;

    ACOMP_CHARTS[key]=new Chart(el,{
      type:'doughnut',
      data:{labels:labels, datasets:[{
        data:data,
        backgroundColor: colors,
        hoverBackgroundColor: colors.map(function(c){
          return c.match&&c.match(/^#[0-9a-f]{6}$/i) ? lighten(c,1.25) : c;
        }),
        borderWidth:2, borderColor:'#fff',
        hoverBorderColor:'rgba(255,255,255,.9)',
        hoverBorderWidth:3,
        hoverOffset:6,
        spacing:2
      }]},
      plugins:[centerLabelPlugin, glowPlugin],
      options:{
        responsive:true, maintainAspectRatio:false, cutout:'72%',
        onClick:onCk,
        plugins:{
          legend:{display:false},
          tooltip:{
            ...tooltipOpts,
            callbacks:{label:function(c){
              var t2=c.dataset.data.reduce(function(a,b){return a+b;},0);
              var pct=t2>0?Math.round(c.raw/t2*100):0;
              var s=' '+c.raw+' iniciativa'+(c.raw!==1?'s':'')+' ('+pct+'%)';
              if(namesMap&&namesMap[c.label])s+='\n'+namesMap[c.label].slice(0,4).map(function(n){return '  · '+n;}).join('\n');
              return s;
            }}
          }
        },
        animation:{animateScale:true, animateRotate:true, duration:700, easing:'easeOutQuart'}
      }
    });
    if(cType)el.style.cursor='pointer';
  }

  mkD('ac-cv-status','k-st',  Object.keys(byStatus),Object.values(byStatus),Object.keys(byStatus).map(function(k){return ACOMP_STATUS_COLORS[k]||'#b0b8cc';}),namesStatus);
  mkD('ac-cv-fase',  'k-fa',  Object.keys(byFase),  Object.values(byFase),  Object.keys(byFase).map(function(k){return ACOMP_FASE_COLORS[k]||'#b0b8cc';}),  namesFase);
  mkD('ac-cv-nivel', 'k-ni',  Object.keys(byNivel), Object.values(byNivel), Object.keys(byNivel).map(function(k){return ACOMP_NIVEL_COLORS[k]||'#b0b8cc';}),namesNivel);
  mkD('ac-cv-nivel2','k-ni2', Object.keys(byNivel), Object.values(byNivel), Object.keys(byNivel).map(function(k){return ACOMP_NIVEL_COLORS[k]||'#b0b8cc';}),namesNivel);

  var PMP_COLORS = ['#2563eb','#7c3aed','#0d9488','#d97706','#84231a','#0891b2','#16a34a'];

  // ── PMP barras horizontais 3D ─────────────────────────────────────
  var pmpEl=document.getElementById('ac-cv-pmp');
  if(pmpEl){
    ACOMP_CHARTS['k-pmp']=new Chart(pmpEl,{
      type:'bar',
      data:{labels:pmpKeys, datasets:[{
        data:pmpKeys.map(function(k){return byPMP[k];}),
        backgroundColor:pmpKeys.map(function(_,i){return PMP_COLORS[i%PMP_COLORS.length];}),
        hoverBackgroundColor:pmpKeys.map(function(_,i){return lighten(PMP_COLORS[i%PMP_COLORS.length],1.2);}),
        borderRadius:{topLeft:2,topRight:8,bottomLeft:2,bottomRight:8},
        borderWidth:0, barThickness:22
      }]},
      plugins:[bar3DPlugin],
      options:{indexAxis:'y', responsive:true, maintainAspectRatio:false,
        layout:{padding:{right:20, top:6, bottom:4}},
        plugins:{legend:{display:false},tooltip:{...tooltipOpts,callbacks:{
          label:function(c){return ' '+c.raw+' iniciativa'+(c.raw!==1?'s':'');},
          afterLabel:function(c){return (namesPMP[c.label]||[]).map(function(n){return '  · '+n;}).join('\n');}
        }}},
        scales:{
          x:{...scaleOpts.y},
          y:{...scaleOpts.x, ticks:{font:{size:10,weight:'600'},color:'#374151'}}
        },
        animation:{duration:700, easing:'easeOutQuart'}
      }
    });
  }

  // ── DtInício barras verticais 3D ─────────────────────────────────
  var byDt={},namesDt={};
  rows.forEach(function(r){
    var proto=String(r[C.protocolo]||r[C.id]||'').trim();
    var nome=String(r[C.nome]||'—');
    var a=getAcompRec(proto);
    var dt=a.dtInicio;
    if(dt&&dt.length>=7){
      var parts=dt.split('-'),y=parts[0],m=parts[1];
      if(y&&m){var k=m+'/'+y;byDt[k]=(byDt[k]||0)+1;if(!namesDt[k])namesDt[k]=[];namesDt[k].push(nome);}
    }
  });
  var dtKeys=Object.keys(byDt).sort(function(a,b){var pa=a.split('/'),pb=b.split('/');return new Date(parseInt(pa[1]),parseInt(pa[0])-1)-new Date(parseInt(pb[1]),parseInt(pb[0])-1);});
  var dtOv=document.getElementById('ac-dtinicio-overlay'),dtCv=document.getElementById('ac-cv-dtinicio');
  if(dtOv)dtOv.style.display=dtKeys.length?'none':'flex';
  if(dtCv)dtCv.style.display=dtKeys.length?'block':'none';
  if(dtKeys.length&&dtCv){
    ACOMP_CHARTS['k-dt']=new Chart(dtCv,{
      type:'bar',
      data:{labels:dtKeys, datasets:[{
        data:dtKeys.map(function(k){return byDt[k];}),
        backgroundColor:'#0d9488',
        hoverBackgroundColor:lighten('#0d9488',1.25),
        borderRadius:{topLeft:8,topRight:8,bottomLeft:0,bottomRight:0},
        borderWidth:0
      }]},
      plugins:[bar3DPlugin],
      options:{responsive:true, maintainAspectRatio:false,
        layout:{padding:{top:10}},
        plugins:{legend:{display:false},tooltip:{...tooltipOpts,callbacks:{
          label:function(c){return ' '+c.raw+' iniciativa'+(c.raw!==1?'s':'');},
          afterLabel:function(c){return (namesDt[c.label]||[]).map(function(n){return '  · '+n;}).join('\n');}
        }}},
        scales:{...scaleOpts, x:{...scaleOpts.x,ticks:{...scaleOpts.x.ticks,maxRotation:40}}},
        animation:{duration:700, easing:'easeOutQuart'}
      }
    });
  }

  // ── PMP × Status barras empilhadas 3D ────────────────────────────
  var pmpStEl=document.getElementById('ac-cv-pmp-status');
  if(pmpStEl){
    var pmpStMap={};

function acBuildRoadmap(rows) {
  var wrap = document.getElementById('ac-roadmap-wrap');
  if (!wrap) return;

  var hoje = new Date();
  var ano  = hoje.getFullYear();
  var mesAtual = hoje.getMonth();

  var ENQ_COLOR = { 'PROJETO':'#1e3a5f','MELHORIA':'#d97706','SUSTENTAÇÃO':'#16a34a','AVALIAÇÃO PMO':'#7c3aed' };
  function enqColor(enq){var k=(enq||'').toUpperCase();return ENQ_COLOR[k]||Object.keys(ENQ_COLOR).reduce(function(r,e){return k.indexOf(e)===0?ENQ_COLOR[e]:r;},'#64748b');}

  var ST_DOT={'Em andamento':'#2563eb','Concluído':'#16a34a','Pausado':'#d97706','Cancelado':'#84231a','Não iniciado':'#b0b8cc'};
  var MESES=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

  // Layout: usa largura total disponível via viewBox
  var COL_NOME=200, COL_ST=48;
  var VW = 1400; // viewBox width
  var MES_W = Math.floor((VW - COL_NOME - COL_ST) / 12);
  var totalW = COL_NOME + COL_ST + MES_W * 12;
  var ROW_H=34, HEADER_H=52;

  function pd(s){var d=new Date(s);return isNaN(d)?null:d;}
  function mesPos(d){return COL_NOME+COL_ST+d.getMonth()*MES_W+((d.getDate()-1)/30)*MES_W;}
  function mesFim(d){return COL_NOME+COL_ST+d.getMonth()*MES_W+(d.getDate()/30)*MES_W;}

  var items=rows.map(function(r){
    var proto=String(r[C.protocolo]||r[C.id]||'').trim();
    var nome=String(r[C.nome]||proto||'—');
    var enq=String(r[C.enquadramento]||'—');
    var a=getAcompRec(proto);
    var st=a.status||'Não iniciado';
    var dtI=pd(a.dtInicio), dtF=pd(a.dtConclusao)||pd(a.dtPrevista)||pd(a.dtCancelamento);
    if(!dtI) dtI=new Date(ano,mesAtual,1);
    if(!dtF) dtF=new Date(dtI.getFullYear(),dtI.getMonth()+2,28);
    var anoI=dtI.getFullYear(),anoF=dtF.getFullYear();
    var startX,endX,overflowLeft=anoI<ano,overflowRight=anoF>ano;
    startX=overflowLeft?(COL_NOME+COL_ST):mesPos(dtI);
    endX=overflowRight?(COL_NOME+COL_ST+12*MES_W):mesFim(dtF);
    if(endX<startX+18)endX=startX+18;
    var atrasado=(st==='Em andamento')&&dtF&&dtF<hoje;
    return{proto,nome,enq,st,dtI,dtF,startX,endX,atrasado,overflowLeft,overflowRight,a};
  }).sort(function(a,b){
    var ma=a.dtI?a.dtI.getMonth():12,mb=b.dtI?b.dtI.getMonth():12;
    return ma!==mb?ma-mb:a.nome.localeCompare(b.nome,'pt');
  });

  var svgH=HEADER_H+items.length*ROW_H+4;
  var hojeX=COL_NOME+COL_ST+mesAtual*MES_W+(hoje.getDate()/30)*MES_W;

  var s='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+totalW+' '+svgH+'" width="100%" preserveAspectRatio="none" style="display:block;min-width:800px;font-family:Inter,Segoe UI,sans-serif">';

  // Fundo
  s+='<rect width="'+totalW+'" height="'+svgH+'" fill="#fff"/>';

  // Zebra fundo
  items.forEach(function(it,idx){
    if(idx%2===0) s+='<rect x="0" y="'+(HEADER_H+idx*ROW_H)+'" width="'+totalW+'" height="'+ROW_H+'" fill="rgba(0,0,0,.013)"/>';
  });

  // Colunas de meses
  MESES.forEach(function(m,i){
    var x=COL_NOME+COL_ST+i*MES_W;
    var isAtual=i===mesAtual;
    if(isAtual) s+='<rect x="'+x+'" y="0" width="'+MES_W+'" height="'+svgH+'" fill="rgba(37,99,235,.04)"/>';
    if(i>0) s+='<line x1="'+x+'" y1="'+HEADER_H+'" x2="'+x+'" y2="'+svgH+'" stroke="rgba(0,0,0,.05)" stroke-width="1"/>';
  });

  // Header bg
  s+='<rect x="0" y="0" width="'+totalW+'" height="'+HEADER_H+'" fill="#f8fafc"/>';
  s+='<rect x="0" y="'+(HEADER_H-1)+'" width="'+totalW+'" height="1" fill="rgba(0,0,0,.08)"/>';

  // Header labels
  s+='<text x="14" y="'+(HEADER_H/2+4)+'" font-size="9" font-weight="700" fill="#84231a" letter-spacing="1.5">PROJETO</text>';
  s+='<line x1="'+(COL_NOME-1)+'" y1="0" x2="'+(COL_NOME-1)+'" y2="'+svgH+'" stroke="rgba(0,0,0,.06)" stroke-width="1"/>';
  s+='<text x="'+(COL_NOME+COL_ST/2)+'" y="'+(HEADER_H/2+4)+'" font-size="9" font-weight="700" fill="#84231a" letter-spacing="1" text-anchor="middle">ST</text>';
  s+='<line x1="'+(COL_NOME+COL_ST-1)+'" y1="0" x2="'+(COL_NOME+COL_ST-1)+'" y2="'+svgH+'" stroke="rgba(0,0,0,.06)" stroke-width="1"/>';

  MESES.forEach(function(m,i){
    var x=COL_NOME+COL_ST+i*MES_W+MES_W/2;
    var isAtual=i===mesAtual;
    s+='<text x="'+x+'" y="'+(HEADER_H/2+4)+'" font-size="9" font-weight="'+(isAtual?'800':'600')+'" fill="'+(isAtual?'#2563eb':'#6b7a99')+'" text-anchor="middle" letter-spacing="1">'+m+'</text>';
    if(isAtual){
      s+='<rect x="'+(x-14)+'" y="8" width="28" height="14" rx="4" fill="#2563eb"/>';
      s+='<text x="'+x+'" y="19" font-size="7" font-weight="800" fill="#fff" text-anchor="middle">'+m+'</text>';
    }
  });

  // Linha HOJE
  s+='<line x1="'+hojeX+'" y1="0" x2="'+hojeX+'" y2="'+svgH+'" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" opacity=".55"/>';
  s+='<rect x="'+(hojeX-18)+'" y="1" width="36" height="14" rx="3" fill="#2563eb" opacity=".9"/>';
  s+='<text x="'+hojeX+'" y="11" font-size="7" font-weight="800" fill="#fff" text-anchor="middle">HOJE</text>';

  // Linhas de projeto
  items.forEach(function(it,idx){
    var y0=HEADER_H+idx*ROW_H, yMid=y0+ROW_H/2, barH=13, barY=yMid-barH/2;
    var cor=enqColor(it.enq), stDot=ST_DOT[it.st]||'#b0b8cc';
    var nomeShort=it.nome.length>28?it.nome.substring(0,28)+'\u2026':it.nome;

    // Linha separadora
    s+='<line x1="0" y1="'+(y0+ROW_H-1)+'" x2="'+totalW+'" y2="'+(y0+ROW_H-1)+'" stroke="rgba(0,0,0,.04)" stroke-width="1"/>';

    // Nome
    s+='<text x="12" y="'+(yMid+4)+'" font-size="10" font-weight="500" fill="#1a202c">'+nomeShort+'</text>';

    // Status dot + label tooltip
    s+='<circle cx="'+(COL_NOME+COL_ST/2)+'" cy="'+yMid+'" r="5" fill="'+stDot+'"><title>'+it.st+'</title></circle>';

    // Barra gantt
    var bw=Math.max(it.endX-it.startX,18);
    var barFill=it.atrasado?'#ef4444':it.st==='Concluído'?'#16a34a':it.st==='Pausado'?'#d97706':it.st==='Cancelado'?'#94a3b8':cor;
    var barOpacity=it.st==='Cancelado'?'0.35':'0.82';
    // Sombra
    s+='<rect x="'+(it.startX+1)+'" y="'+(barY+2)+'" width="'+bw+'" height="'+barH+'" rx="'+(barH/2)+'" fill="rgba(0,0,0,.07)"/>';
    // Barra fundo (restante)
    s+='<rect x="'+it.startX+'" y="'+barY+'" width="'+bw+'" height="'+barH+'" rx="'+(barH/2)+'" fill="'+barFill+'" opacity="0.28"/>';
    // Progresso preenchido
    var prog=it.a.progresso||0;
    if(prog>0&&it.st!=='Cancelado'){
      var progW=bw*(prog/100);
      s+='<rect x="'+it.startX+'" y="'+barY+'" width="'+progW+'" height="'+barH+'" rx="'+(barH/2)+'" fill="'+barFill+'" opacity="'+barOpacity+'"/>';
    } else if(it.st==='Cancelado'||it.st==='Concluído'){
      s+='<rect x="'+it.startX+'" y="'+barY+'" width="'+bw+'" height="'+barH+'" rx="'+(barH/2)+'" fill="'+barFill+'" opacity="'+barOpacity+'"/>';
    }
    // Borda da barra
    s+='<rect x="'+it.startX+'" y="'+barY+'" width="'+bw+'" height="'+barH+'" rx="'+(barH/2)+'" fill="none" stroke="'+barFill+'" stroke-width="1" opacity="0.5"/>';

    if(it.overflowLeft) s+='<polygon points="'+(COL_NOME+COL_ST)+','+(yMid-5)+' '+(COL_NOME+COL_ST-8)+','+yMid+' '+(COL_NOME+COL_ST)+','+(yMid+5)+'" fill="'+cor+'" opacity=".7"/>';
    if(it.overflowRight){var rx=COL_NOME+COL_ST+12*MES_W;s+='<polygon points="'+rx+','+(yMid-5)+' '+(rx+8)+','+yMid+' '+rx+','+(yMid+5)+'" fill="'+cor+'" opacity=".7"/>';}

    s+='<rect x="0" y="'+y0+'" width="'+totalW+'" height="'+ROW_H+'" fill="transparent" opacity="0"><title>'+it.nome+' · '+it.enq+' · '+it.st+(prog?' · '+prog+'%':'')+' · '+(it.a.pmp||'')+'</title></rect>';
  });

  s+='</svg>';

  // Legenda — enquadramento + status
  var legHtml='<div style="display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(0,0,0,.06);align-items:center">';
  legHtml+='<span style="font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase">Enquadramento:</span>';
  [{cor:'#1e3a5f',label:'Projeto'},{cor:'#d97706',label:'Melhoria'},{cor:'#16a34a',label:'Sustentação'},{cor:'#7c3aed',label:'Aval. PMO'}].forEach(function(li){
    legHtml+='<span style="display:flex;align-items:center;gap:5px;font-size:10px;color:#374151"><span style="width:14px;height:8px;border-radius:4px;background:'+li.cor+';display:inline-block;opacity:.85"></span>'+li.label+'</span>';
  });
  legHtml+='<span style="width:1px;height:14px;background:rgba(0,0,0,.1);display:inline-block;margin:0 4px"></span>';
  legHtml+='<span style="font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase">Status:</span>';
  [{cor:'#2563eb',label:'Em Andamento'},{cor:'#16a34a',label:'Concluído'},{cor:'#d97706',label:'Pausado'},{cor:'#84231a',label:'Cancelado'},{cor:'#b0b8cc',label:'Não iniciado'},{cor:'#ef4444',label:'Atrasado'}].forEach(function(li){
    legHtml+='<span style="display:flex;align-items:center;gap:5px;font-size:10px;color:#374151"><span style="width:8px;height:8px;border-radius:50%;background:'+li.cor+';display:inline-block"></span>'+li.label+'</span>';
  });
  legHtml+='<span style="display:flex;align-items:center;gap:5px;font-size:10px;color:#374151;margin-left:4px"><svg width="16" height="10"><line x1="8" y1="0" x2="8" y2="10" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="2 2"/></svg>Hoje</span>';
  legHtml+='<span style="font-size:9px;color:var(--dim);margin-left:auto">Barra clara = restante · Barra sólida = progresso concluído</span>';
  legHtml+='</div>';

  wrap.innerHTML=s+legHtml;
}
function acRefreshAll() {
  var rows=acGetExecRows(); var tot=rows.length; if(!tot)return;
  var byStatus={},byFase={},byEnq={},byNivel={},totProg=0,invT=0,recT=0;
  var namesStatus={},namesFase={},namesEnq={},namesNivel={};
  var agingVals=[];
  rows.forEach(function(r){
    var proto=String(r[C.protocolo]||r[C.id]||'').trim();
    var nome=String(r[C.nome]||'—');
    var a=getAcompRec(proto);
    var st=a.status||'Não iniciado',fa=a.fase||'Sem fase',en=String(r[C.enquadramento]||'—'),ni=String(r[C.nivelEst]||'—').split('(')[0].trim();
    byStatus[st]=(byStatus[st]||0)+1;byFase[fa]=(byFase[fa]||0)+1;byEnq[en]=(byEnq[en]||0)+1;byNivel[ni]=(byNivel[ni]||0)+1;
    totProg+=(a.progresso||0);
    if(!namesStatus[st])namesStatus[st]=[];namesStatus[st].push(nome);
    if(!namesFase[fa])namesFase[fa]=[];namesFase[fa].push(nome);
    if(!namesEnq[en])namesEnq[en]=[];namesEnq[en].push(nome);
    if(!namesNivel[ni])namesNivel[ni]=[];namesNivel[ni].push(nome);
    var inv=parseFloat(String(r[C.investimento]||'').replace(/[^0-9.]/g,''))||0;
    var rec=parseFloat(String(r[C.receita]||'').replace(/[^0-9.]/g,''))||0;
    invT+=inv;recT+=rec;
    if(a.dtInicio&&a.dtConclusao){var di=new Date(a.dtInicio),dc=new Date(a.dtConclusao);if(!isNaN(di)&&!isNaN(dc)&&dc>=di){var d=Math.round((dc-di)/86400000);if(a.dtPausa&&a.dtRetomada){var dp=new Date(a.dtPausa),dr=new Date(a.dtRetomada);if(!isNaN(dp)&&!isNaN(dr)&&dr>dp)d-=Math.round((dr-dp)/86400000);}agingVals.push(Math.max(0,d));}}
  });
  var avgProg=Math.round(totProg/tot);
  var agingMed=agingVals.length?Math.round(agingVals.reduce(function(a,b){return a+b;},0)/agingVals.length):null;
  function agingFmt(d){if(d===null)return'—';if(d<30)return d+'d';var m=Math.floor(d/30),r=d%30;return r?m+'m '+r+'d':m+'m';}

  function upd(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}
  upd('ac-kpi-tot',tot);upd('ac-kpi-and',byStatus['Em andamento']||0);upd('ac-kpi-conc',byStatus['Concluído']||0);upd('ac-kpi-paus',byStatus['Pausado']||0);upd('ac-kpi-canc',byStatus['Cancelado']||0);
  upd('ac-kpi-aging',agingFmt(agingMed));
  var agSub=document.getElementById('ac-kpi-aging-sub');if(agSub)agSub.textContent=agingVals.length?agingVals.length+' projeto'+(agingVals.length!==1?'s':'')+' concluído'+(agingVals.length!==1?'s':''):'preencha Dt. Conclusão';

  function updLeg(id,obj,colorMap,tipo){var el=document.getElementById(id);if(!el)return;el.innerHTML=Object.entries(obj).map(function(kv){var c=colorMap[kv[0]]||'#b0b8cc';var clickAttr=tipo?' style="cursor:pointer" onclick="acOpenModalFiltro(\''+tipo+'\',\''+kv[0].replace(/'/g,"\\'")+'\')"':'';return '<span class="ac-leg-item"'+clickAttr+'><span class="ac-leg-dot" style="background:'+c+'"></span>'+kv[0]+'&nbsp;<b>'+kv[1]+'</b></span>';}).join('');}
  updLeg('ac-leg-status',byStatus,ACOMP_STATUS_COLORS,'status');updLeg('ac-leg-fase',byFase,ACOMP_FASE_COLORS,'fase');updLeg('ac-leg-enq',byEnq,ACOMP_ENQ_COLORS,'enq');updLeg('ac-leg-nivel',byNivel,ACOMP_NIVEL_COLORS,'nivel');updLeg('ac-leg-nivel2',byNivel,ACOMP_NIVEL_COLORS,'nivel');

  // Rebuild PMP
  var byPMP2={},namesPMP2={};
  rows.forEach(function(r){var proto=String(r[C.protocolo]||r[C.id]||'').trim();var nome=String(r[C.nome]||'—');var a=getAcompRec(proto);var p=a.pmp||'Sem PMP';byPMP2[p]=(byPMP2[p]||0)+1;if(!namesPMP2[p])namesPMP2[p]=[];namesPMP2[p].push(nome);});
  var pmpKeys2=Object.keys(byPMP2).sort(function(a,b){return byPMP2[b]-byPMP2[a];});

  Object.values(ACOMP_CHARTS).forEach(function(c){try{c.destroy();}catch(e){}});
  ACOMP_CHARTS={};
  acBuildAllCharts(rows,tot,byStatus,byFase,byEnq,byNivel,namesStatus,namesFase,namesEnq,namesNivel,pmpKeys2,byPMP2,namesPMP2);
}

function acOpenModal(tipo) {
  var cfg = AC_MODAL_CFG[tipo];
  if (!cfg) return;
  var rows = acGetExecRows();

  // Monta lista de cards
  var items = rows.map(function(r) {
    var proto = String(r[C.protocolo]||r[C.id]||'').trim();
    var nome  = String(r[C.nome]||'—');
    var enqd  = String(r[C.enquadramento]||'—');
    var nivel = String(r[C.nivelEst]||'—').split('(')[0].trim();
    var score = parseFloat(r[C.scoreEst])||0;
    var a     = getAcompRec(proto);
    var inv   = parseFloat(String(r[C.investimento]||'').replace(/[^0-9.]/g,''))||0;
    var rec   = parseFloat(String(r[C.receita]||'').replace(/[^0-9.]/g,''))||0;
    return { proto:proto, nome:nome, enqd:enqd, nivel:nivel, score:score, a:a, inv:inv, rec:rec, r:r };
  }).filter(function(d){ return cfg.filter(d.a); });

  if (!items.length) {
    items = [{ proto:'—', nome:'Nenhum projeto nesta categoria ainda.', enqd:'', nivel:'', score:0, a:{}, inv:0, rec:0 }];
  }

  // Ordena: showInv → por inv desc, showRec → por rec desc, showAll → por score desc, default → por nome
  if (cfg.showInv)  items.sort(function(a,b){ return b.inv - a.inv; });
  else if (cfg.showRec) items.sort(function(a,b){ return b.rec - a.rec; });
  else if (cfg.showAll) items.sort(function(a,b){ return b.score - a.score; });
  else items.sort(function(a,b){ return a.nome.localeCompare(b.nome,'pt'); });

  var totalInv = items.reduce(function(s,d){ return s+d.inv; },0);
  var totalRec = items.reduce(function(s,d){ return s+d.rec; },0);
  var maxInv   = items.length ? Math.max.apply(null, items.map(function(d){ return d.inv; })) : 1;
  var maxRec   = items.length ? Math.max.apply(null, items.map(function(d){ return d.rec; })) : 1;

  function agingCalc(a) {
    if(!a.dtInicio||!a.dtConclusao) return null;
    var di=new Date(a.dtInicio),dc=new Date(a.dtConclusao);
    if(isNaN(di)||isNaN(dc)||dc<di) return null;
    var d=Math.round((dc-di)/86400000);
    if(a.dtPausa&&a.dtRetomada){var dp=new Date(a.dtPausa),dr=new Date(a.dtRetomada);if(!isNaN(dp)&&!isNaN(dr)&&dr>dp)d-=Math.round((dr-dp)/86400000);}
    return Math.max(0,d);
  }
  function agingFmtL(d){if(d===null)return'—';if(d<30)return d+'d';var m=Math.floor(d/30),r=d%30;return r?m+'m '+r+'d':m+'m';}

  var cardsHtml = items.map(function(d) {
    var stColor = ACOMP_STATUS_COLORS[d.a.status||'Não iniciado']||'#b0b8cc';
    var stLabel = d.a.status||'Não iniciado';
    var prog    = d.a.progresso||0;
    var pcol    = acProgColor(prog);
    var aging   = agingCalc(d.a);

    var metaLine = '<div class="kpi-proj-meta" style="gap:8px;flex-wrap:wrap">';
    if(d.proto!=='—') metaLine += '<span style="font-family:var(--mono);font-size:10px;color:var(--muted)">'+d.proto+'</span>';
    if(d.enqd)  metaLine += '<span class="badge '+enqBadge(d.enqd)+'">'+d.enqd+'</span>';
    if(d.nivel) metaLine += '<span style="font-size:10px;'+nivelSt(d.nivel)+'">'+d.nivel+'</span>';
    if(d.score) metaLine += '<span style="font-size:10px;color:'+sc(d.score)+'">Score: '+d.score+'</span>';
    if(d.a.status) metaLine += '<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;background:'+stColor+'22;color:'+stColor+'">'+stLabel+'</span>';
    metaLine += '</div>';

    var extraLine = '';
    // Progresso
    if(d.proto!=='—') {
      extraLine += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">'
        + '<div style="font-size:10px;color:var(--muted);min-width:64px">Progresso</div>'
        + '<div style="flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden">'
        + '<div style="width:'+prog+'%;height:100%;background:'+pcol+';border-radius:3px"></div></div>'
        + '<span style="font-size:11px;font-weight:700;color:'+pcol+';min-width:30px;text-align:right">'+prog+'%</span></div>';
    }
    // Investimento / Receita bars
    if(cfg.showInv && d.inv>0) {
      var bPct = Math.round(d.inv/maxInv*100);
      extraLine += '<div style="display:flex;align-items:center;gap:8px;margin-top:6px">'
        + '<div style="font-size:10px;color:var(--muted);min-width:64px">Investimento</div>'
        + '<div style="flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden">'
        + '<div style="width:'+bPct+'%;height:100%;background:var(--red);border-radius:3px"></div></div>'
        + '<span style="font-size:11px;font-weight:700;color:var(--red);min-width:80px;text-align:right">'+formatBRL(d.inv)+'</span></div>';
    }
    if(cfg.showRec && d.rec>0) {
      var rPct = Math.round(d.rec/maxRec*100);
      extraLine += '<div style="display:flex;align-items:center;gap:8px;margin-top:6px">'
        + '<div style="font-size:10px;color:var(--muted);min-width:64px">Receita/mês</div>'
        + '<div style="flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden">'
        + '<div style="width:'+rPct+'%;height:100%;background:#16a34a;border-radius:3px"></div></div>'
        + '<span style="font-size:11px;font-weight:700;color:#16a34a;min-width:80px;text-align:right">'+formatBRL(d.rec)+'</span></div>';
    }
    // Aging
    if(tipo==='ac-aging' && aging!==null) {
      extraLine += '<div style="display:flex;align-items:center;gap:8px;margin-top:6px">'
        + '<div style="font-size:10px;color:var(--muted);min-width:64px">Aging líquido</div>'
        + '<span style="font-size:12px;font-weight:700;color:#0d9488">'+agingFmtL(aging)+'</span>'
        + (d.a.dtPausa?'<span style="font-size:9px;color:var(--dim)">(pausas descontadas)</span>':'')
        + '</div>';
    }
    // Datas resumo
    if(d.proto!=='—' && (d.a.dtInicio||d.a.dtPrevista)) {
      var dtInfo = [];
      if(d.a.dtInicio)   dtInfo.push('Início: '+d.a.dtInicio.split('-').reverse().join('/'));
      if(d.a.dtPrevista) dtInfo.push('Previsto: '+d.a.dtPrevista.split('-').reverse().join('/'));
      if(d.a.dtConclusao)dtInfo.push('Conclusão: '+d.a.dtConclusao.split('-').reverse().join('/'));
      extraLine += '<div style="font-size:10px;color:var(--dim);margin-top:4px">'+dtInfo.join(' · ')+'</div>';
    }
    // Objetivo (primeiro)
    if(d.proto!=='—' && d.a.objetivo) {
      extraLine += '<div style="background:rgba(13,148,136,.06);border:1px solid rgba(13,148,136,.2);border-radius:6px;padding:7px 10px;margin-top:8px">'
        + '<div style="font-size:9px;font-weight:700;color:#0d9488;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">🎯 Objetivo</div>'
        + '<div style="font-size:11px;color:var(--text);line-height:1.4">'+d.a.objetivo.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>';
    }
    // Comentário mais recente (depois do objetivo)
    if(d.a.historico && d.a.historico.length) {
      var h0 = d.a.historico[0];
      extraLine += '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;margin-top:8px">'
        + '<div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">Último ponto de controle</div>'
        + '<div style="font-size:11px;color:var(--text);line-height:1.4">'+h0.texto+'</div>'
        + '<div style="font-size:9px;color:var(--dim);margin-top:2px">'+h0.data+'</div></div>';
    }

    return '<div class="kpi-proj-card" style="border-left-color:'+cfg.color+'">'
      + '<div class="kpi-proj-name">'+d.nome+'</div>'
      + metaLine
      + extraLine
      + '</div>';
  }).join('');

  // Subtítulo com totais
  var subTxt = cfg.sub;
  if(cfg.showInv && totalInv>0) subTxt += ' · Total: ' + formatBRL(totalInv);
  if(cfg.showRec && totalRec>0) subTxt += ' · Total: ' + formatBRL(totalRec) + '/mês';
  if(tipo!=='ac-investimento' && tipo!=='ac-receita') subTxt += ' · ' + items.filter(function(d){return d.proto!=='—';}).length + ' projeto' + (items.length!==1?'s':'');

  document.getElementById('kpi-modal-icon').textContent  = cfg.icon;
  document.getElementById('kpi-modal-title').textContent = cfg.title;
  document.getElementById('kpi-modal-sub').textContent   = subTxt;
  document.getElementById('kpi-modal-body').innerHTML    = cardsHtml;
  document.getElementById('kpi-modal-ov').classList.add('open');
  document.body.style.overflow = 'hidden';
}

loadData();
</script>


<!-- FINANCIAL MODAL -->
<div class="kpi-modal-overlay" id="fin-modal-ov" onclick="closeFinModal(event)">
  <div class="kpi-modal" style="max-width:680px">
    <div class="kpi-modal-hdr">
      <div style="display:flex;align-items:center">
        <span class="kpi-modal-icon" id="fin-modal-icon"></span>
        <div>
          <div class="kpi-modal-title" id="fin-modal-title">—</div>
          <div class="kpi-modal-sub" id="fin-modal-sub">—</div>
        </div>
      </div>
      <button class="kpi-modal-x" onclick="closeFinModalD()">&times;</button>
    </div>
    <div class="kpi-modal-body" id="fin-modal-body"></div>
  </div>
</div>

<!-- KPI MODAL -->
<div class="kpi-modal-overlay" id="kpi-modal-ov" onclick="closeKpiModal(event)">
  <div class="kpi-modal">
    <div class="kpi-modal-hdr">
      <div style="display:flex;align-items:center">
        <span class="kpi-modal-icon" id="kpi-modal-icon"></span>
        <div>
          <div class="kpi-modal-title" id="kpi-modal-title">—</div>
          <div class="kpi-modal-sub" id="kpi-modal-sub">—</div>
        </div>
      </div>
      <button class="kpi-modal-x" onclick="closeKpiModalD()">&times;</button>
    </div>
    <div class="kpi-modal-body" id="kpi-modal-body"></div>
  </div>
</div>

<div id="kpi-global-tooltip"></div>
</body>
</html>
