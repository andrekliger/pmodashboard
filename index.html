<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO Concept · Dashboard v2</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f3f4f6;--surface:#fff;--surface2:#f8f9fb;--surface3:#eef0f4;
  --border:#e2e5eb;--text:#1a1d23;--muted:#6b7a99;--dim:#b0b8cc;
  --red:#84231a;--red2:#a02218;--redalpha:rgba(132,35,26,.07);
  --blue:#2563eb;--green:#16a34a;--amber:#d97706;--purple:#7c3aed;--teal:#0d9488;--orange:#ea580c;
  --blue-dim:rgba(37,99,235,.08);--purple-dim:rgba(124,58,237,.08);
  --font:'Poppins',sans-serif;--mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(132,35,26,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(132,35,26,.06) 1px,transparent 1px);
  background-size:40px 40px}
.wrap{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 24px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0 22px;border-bottom:2px solid rgba(132,35,26,.15);margin-bottom:28px}
.tb-brand{display:flex;align-items:center;gap:14px}
.tb-logo{width:42px;height:42px;border-radius:10px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.tb-title{font-size:15px;font-weight:700}
.tb-sub{font-size:11px;color:var(--muted)}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(132,35,26,.1);color:var(--red)}
.last-upd{font-size:11px;color:var(--muted);font-family:var(--mono)}
.btn-ref{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;background:var(--red);border:none;color:#fff;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-ref:hover{background:var(--red2)}
.btn-ref.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:28px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;width:fit-content;max-width:100%}
.tab{padding:8px 20px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;border:none;background:transparent;font-family:var(--font)}
.tab.active{background:var(--red);color:#fff}
/* Tab de destaque — Acompanhamento do Portfólio */
.tab-acomp{
  background:linear-gradient(135deg,#84231a 0%,#a02c21 100%) !important;
  color:#fff !important;
  font-weight:700 !important;
  letter-spacing:.2px;
  box-shadow:0 3px 10px rgba(132,35,26,.35);
  border:1.5px solid rgba(255,255,255,.15);
  display:flex;align-items:center;gap:2px;
  transition:all .2s !important;
}
.tab-acomp:hover{
  background:linear-gradient(135deg,#6e1b14 0%,#8a2319 100%) !important;
  box-shadow:0 5px 16px rgba(132,35,26,.5);
  transform:translateY(-1px);
}
.tab-acomp.active{
  background:linear-gradient(135deg,#5a1510 0%,#7a1f18 100%) !important;
  box-shadow:0 2px 6px rgba(132,35,26,.4) inset;
  transform:translateY(0);
}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid rgba(132,35,26,.2);display:inline-block}
.grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;align-items:stretch}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;align-items:stretch}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;align-items:stretch}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.grid-21{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;min-height:110px}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.kpi-accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:12px 0 0 12px}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:800;line-height:1.1;margin-bottom:3px;word-break:break-word;overflow-wrap:break-word;hyphens:auto}
.kpi-sub{font-size:10px;color:var(--muted)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;flex-direction:column}
.panel-donut{height:320px}
.panel-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.panel-sub{font-size:11px;color:var(--muted);margin-bottom:16px}
.rl-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rl-label{font-size:10px;color:var(--muted);width:130px;flex-shrink:0;text-align:right}
.rl-bar{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.rl-fill{height:100%;border-radius:3px;transition:width .8s}
.rl-val{font-size:10px;font-weight:700;font-family:var(--mono);width:32px;text-align:right}
.enq-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.enq-pill{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 10px;border-radius:20px;width:115px;text-align:center;flex-shrink:0}
.enq-track{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.enq-fill{height:100%;border-radius:3px}
.enq-count{font-size:12px;font-weight:700;font-family:var(--mono);width:24px;text-align:right}
.enq-pct{font-size:10px;color:var(--muted);width:36px;text-align:right}
.health-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0}
.health-num{font-size:52px;font-weight:800;line-height:1}
.health-label{font-size:11px;color:var(--muted);margin-top:4px}
.health-bar{width:100%;height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;margin-top:12px}
.health-fill{height:100%;border-radius:4px;transition:width .8s}
.matrix-table{width:100%;border-collapse:collapse;font-size:11px}
.matrix-table th,.matrix-table td{padding:8px 10px;border:1px solid var(--border);text-align:center}
.matrix-table th{background:rgba(132,35,26,.08);font-size:9px;font-weight:700;text-transform:uppercase;color:var(--red)}
.matrix-cell{transition:filter .15s}
.matrix-cell:hover{filter:brightness(.92)}
.m-max{background:rgba(22,163,74,.12);color:#15803d}
.m-high{background:rgba(217,119,6,.12);color:#b45309}
.m-mid{background:rgba(234,88,12,.12);color:#c2410c}
.m-low{background:rgba(160,34,24,.1);color:var(--red)}
.area-item{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.area-name{font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.area-track{width:80px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.area-fill{height:100%;background:var(--red);border-radius:2px}
.area-count{font-size:11px;font-weight:600;font-family:var(--mono);width:18px;text-align:right;color:var(--muted)}
.tbl-wrap{overflow-x:auto}
.main-tbl{width:100%;border-collapse:collapse;font-size:12px}
.main-tbl thead tr{border-bottom:2px solid rgba(132,35,26,.15)}
.main-tbl th{padding:8px 12px;font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);white-space:nowrap}
.main-tbl td{padding:9px 12px;border-bottom:1px solid var(--border)}
.main-tbl tbody tr:last-child td{border-bottom:none}
.main-tbl tbody tr.clk{cursor:pointer}
.main-tbl tbody tr.clk:hover td{background:var(--redalpha)}
.td-mono{font-family:var(--mono);font-size:11px;color:var(--muted)}
.badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.b-proj{background:rgba(37,99,235,.1);color:#1d4ed8}
.b-sust{background:rgba(22,163,74,.1);color:#15803d}
.b-melh{background:rgba(217,119,6,.1);color:#b45309}
.b-pmo{background:rgba(124,58,237,.1);color:#6d28d9}
.b-sim{background:rgba(160,34,24,.1);color:var(--red)}
.b-nao{background:rgba(22,163,74,.1);color:#15803d}
.esc-alert{background:rgba(132,35,26,.05);border:1px solid rgba(132,35,26,.18);border-left:3px solid var(--red);border-radius:10px;padding:11px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;font-size:12px}
.esc-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px}
.spinner{width:40px;height:40px;border:3px solid var(--surface3);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
.loading-txt{font-size:13px;color:var(--muted)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(30,10,8,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:800px;max-height:88vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 26px 14px;border-bottom:2px solid rgba(132,35,26,.12);position:sticky;top:0;background:var(--surface);z-index:2;border-radius:18px 18px 0 0}
.modal-title{font-size:16px;font-weight:700}
.modal-proto{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.modal-x{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-left:14px;font-family:var(--font)}
.modal-body{padding:22px 26px}
.modal-hero{border-left:4px solid var(--red);background:var(--surface2);border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:18px}
.modal-enq{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.modal-res{font-size:20px;font-weight:800;margin-bottom:3px}
.modal-acao{font-size:12px;color:var(--muted);margin-bottom:8px}
.modal-meta{display:flex;gap:18px;flex-wrap:wrap;font-size:11px}
.modal-scores{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.ms-box{flex:1;min-width:75px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;text-align:center}
.ms-label{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:3px}
.ms-val{font-size:17px;font-weight:800;font-family:var(--mono)}
.modal-sec{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid rgba(132,35,26,.2)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.mf{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px}
.mf.full{grid-column:1/-1}
.mf-l{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.mf-v{font-size:12px;color:var(--text);line-height:1.4}
.ans-tbl{width:100%;border-collapse:collapse;font-size:11px}
.ans-tbl th{padding:5px 9px;font-size:8px;font-weight:700;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);text-align:left}
.ans-tbl td{padding:6px 9px;border-bottom:1px solid rgba(0,0,0,.04);vertical-align:top}
.ans-tbl tr:last-child td{border-bottom:none}
.ans-tbl tr:hover td{background:var(--redalpha)}
.ans-pill{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px}
.ap-sim{background:rgba(22,163,74,.1);color:#15803d}
.ap-par{background:rgba(217,119,6,.1);color:#b45309}
.ap-nao{background:rgba(160,34,24,.1);color:var(--red)}
.ap-none{background:var(--surface3);color:var(--muted)}

.fin-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.fin-row:last-child{border-bottom:none}
.fin-label{font-size:12px;color:var(--muted)}
.fin-val{font-size:16px;font-weight:700;font-family:var(--mono)}


/* ── KPI MODAL ── */
.kpi-modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(30,10,8,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .25s}
.kpi-modal-overlay.open{opacity:1;pointer-events:all}
.kpi-modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:620px;max-height:80vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.kpi-modal-overlay.open .kpi-modal{transform:translateY(0)}
.kpi-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 14px;border-bottom:2px solid rgba(132,35,26,.12);position:sticky;top:0;background:var(--surface);z-index:2;border-radius:18px 18px 0 0}
.kpi-modal-icon{font-size:22px;margin-right:10px}
.kpi-modal-title{font-size:15px;font-weight:700;color:var(--text)}
.kpi-modal-sub{font-size:11px;color:var(--muted);margin-top:1px}
.kpi-modal-x{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-family:var(--font);transition:all .2s}
.kpi-modal-x:hover{border-color:var(--red);color:var(--red)}
.kpi-modal-body{padding:20px 24px}
.kpi-proj-card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.kpi-proj-card:hover{border-color:var(--red);box-shadow:0 4px 12px rgba(132,35,26,.1);transform:translateY(-1px)}
.kpi-proj-card:last-child{margin-bottom:0}
.kpi-proj-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.kpi-proj-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:6px}
.kpi-proj-desc{font-size:11px;color:var(--muted);line-height:1.5}
.kpi-empty{text-align:center;padding:32px;color:var(--dim);font-size:13px}
.kpi.clickable{cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s}
.kpi.clickable:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(132,35,26,.12);border-color:rgba(132,35,26,.3)}


/* ── TOOLTIP INFO ── */
.kpi-info{position:absolute;top:10px;right:10px;width:16px;height:16px;border-radius:50%;background:rgba(107,122,153,.15);color:var(--muted);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;line-height:1;font-family:serif;font-style:italic;z-index:10}
.kpi-info:hover{background:var(--red);color:#fff}
#kpi-global-tooltip{display:none;position:fixed;width:240px;background:#1a1d23;color:#e8edf5;font-size:11px;line-height:1.6;padding:12px 14px;border-radius:10px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.35);font-family:'Poppins',sans-serif;font-weight:400;pointer-events:none;border:1px solid rgba(132,35,26,.3)}
#kpi-global-tooltip::after{content:'';position:absolute;bottom:-5px;right:14px;width:10px;height:10px;background:#1a1d23;transform:rotate(45deg);border:1px solid rgba(132,35,26,.3);border-top:none;border-left:none}

/* debug */
.debug-box{background:#1a1d23;color:#4ade80;font-family:var(--mono);font-size:11px;padding:12px 16px;border-radius:8px;margin-bottom:16px;white-space:pre-wrap;display:none}

/* DELIBERACAO */
.delib-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid #b0b8cc;border-radius:14px;padding:20px 22px;margin-bottom:14px}
.delib-card.st-aprovado{border-left-color:#84231a}
.delib-card.st-devolvido{border-left-color:#d97706}
.delib-card.st-reprovado{border-left-color:#84231a}
.delib-name{font-size:15px;font-weight:700;margin-bottom:6px}
.delib-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:12px;align-items:center}
.delib-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px;padding:10px 14px;background:var(--surface2);border-radius:8px}
.delib-fins{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.delib-fin{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px}
.delib-fin-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:2px}
.delib-fin-v{font-weight:700;font-family:var(--mono);font-size:13px}
.delib-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-aprov{padding:9px 18px;border-radius:8px;border:none;background:#84231a;color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer}
.btn-aprov:hover{background:#a02c21}
.btn-devol{padding:9px 18px;border-radius:8px;border:none;background:#d97706;color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer}
.btn-devol:hover{background:#b45309}
.btn-reprov{padding:9px 18px;border-radius:8px;border:none;background:var(--red);color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer}
.btn-reprov:hover{background:var(--red2)}
.btn-desfaz{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--font);font-size:11px;cursor:pointer}
.btn-desfaz:hover{border-color:var(--red);color:var(--red)}
.dst-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px}
.dst-aprovado{background:rgba(22,163,74,.12);color:#15803d}
.dst-devolvido{background:rgba(217,119,6,.12);color:#b45309}
.dst-reprovado{background:rgba(132,35,26,.12);color:#84231a}
.dst-pendente{background:rgba(176,184,204,.15);color:#6b7a99}
.dfbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}
.dfbtn.active{background:var(--red);color:#fff;border-color:var(--red)}
.delib-obs{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:12px;color:var(--text);background:var(--surface2);resize:vertical;min-height:56px;margin-bottom:10px;outline:none}
.delib-obs:focus{border-color:var(--red)}
.dsummary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.dsbox{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center}
.dsbox-num{font-size:28px;font-weight:800;line-height:1;margin-bottom:3px}
.dsbox-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
@media(max-width:1100px){.grid-6,.grid-3,.grid-21{grid-template-columns:1fr 1fr}.grid-4{grid-template-columns:repeat(2,1fr)}}

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxw4vr3XAzsnE1FcB07ZstonVCxvydy23YEkaH4ZEi6rWgk3_LNG6GFh8DamRqprOgb/exec";

// ── COLUNA MAP — fonte única de verdade para índices da planilha ──────────────
// Índices 0-based (JavaScript). Para GAS use idx+1.
// NUNCA use números mágicos em outros lugares — referencie sempre C.campo.
const COLUMN_MAP = {
  id:0, dataHora:1, nome:2, protocolo:3, dataSolic:4, area:5, categoria:6, tipoBeneficio:7,
  gestor:8, resp:9, classBy:10, investimento:11, receita:12, payback:13, desc:14, just:15,
  scoreEst:16, scoreObj:17, scoreFCS:18, scoreAve:19, nivelEst:22, enquadramento:23,
  scoreProj:24, scoreSust:25, triggers:26, resultado:28, escalonamento:29, acao:30,
  statusDelib:100, obsDelib:101, dataDelib:102,
  statusRefinamento:103, percentualRefinamento:104,
  tapLider:105, tapJustificativa:106, tapInvestimento:107, tapReceita:108, tapDuracao:109,
  tapBeneficios:110, tapHasBP:111, tapSentBP:112, tapInScope:113, tapOutScope:114,
  tapMilestones:115, tapPessoas:116, tapInfra:117, tapPremissas:118,
  tapRestricoes:119, tapRiscos:120, tapCriterios:121,
};

// ── PMOUtils — utilitários centralizados (sem duplicação) ─────────────────────
const PMOUtils = {
  /** Float → R$ xx.xxx,xx */
  formatBRL(v) {
    const n = this.parseMoney(v);
    if (!n) return '—';
    return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  },
  /** Qualquer representação de moeda → float */
  parseMoney(v) {
    if (typeof v === 'number') return isNaN(v) ? 0 : v;
    if (!v) return 0;
    const s = String(v).replace(/R\$|\s/gi,'').trim();
    return parseFloat(s.includes(',') ? s.replace(/\./g,'').replace(',','.') : s) || 0;
  },
  /** Normaliza status para comparação */
  status(v) { return String(v||'').trim().toUpperCase(); },
  /** Categorias com retorno financeiro direto */
  CATS_PROD: ['crescimento / expansão', 'eficiência / produtividade'],
  isProd(cat) { return this.CATS_PROD.includes(String(cat||'').toLowerCase().trim()); },
  /** Parse de data PT-BR ou ISO */
  parseDate(v) {
    if (!v) return null;
    const s = String(v).trim();
    if (s.includes('T')) { const d = new Date(s); return isNaN(d) ? null : d; }
    if (s[2]=='/') { const [d,m,y]=s.split('/'); return new Date(+y,+m-1,+d); }
    if (s[4]==='-') { const [y,m,d]=s.split('-'); return new Date(+y,+m-1,+d); }
    return null;
  },
  /** Debounce genérico */
  debounce(fn, ms) {
    let t; return function(...a) { clearTimeout(t); t = setTimeout(()=>fn.apply(this,a), ms); };
  },
};

// ── COMPAT: formatBRL global usado em muitos lugares ─────────────────────────
function formatBRL(v) { return PMOUtils.formatBRL(v); }

let C = {};

// ═════════════════════════════════════════════════════════════════════════════════
// MAPEAMENTO DINÂMICO DE COLUNAS — 3 Cenários de Versionamento
// ═════════════════════════════════════════════════════════════════════════════════
// A estrutura do Sheets evolui conforme novas colunas são adicionadas.
// O dashboard deve lidar com dados legados, em transição e novos simultaneamente.
// O mapeamento é detectado automaticamente no callback window.__pmoCB.
//
// CENÁRIO A: Base Legada (<=100 colunas)
//   Sem "Categoria da Iniciativa" nem "Tipo de Benefício"
//   Deliberação: Status(col95) Obs(col96) Data(col97)
//   payback: idx 11, scoreEst: idx 14
//
// CENÁRIO B: Base Intermédia (101-102 colunas)
//   Com "Tipo de Benefício" (col 8 = idx 7), mas sem "Categoria"
//   Deliberação: Status(col99) Obs(col100) Data(col101)
//   payback: idx 12, scoreEst: idx 15
//
// CENÁRIO C: Base Completa (>=103 colunas)
//   Com "Categoria da Iniciativa" (col 7 = idx 6) e "Tipo de Benefício" (col 8 = idx 7)
//   Com "Percentual de Refinamento" (col 32 = idx 31 — inserido em doPost)
//   Deliberação: Status(col 103 = idx 102) Obs(col 101 = idx 100) Data(col 102 = idx 101)
//   payback: idx 13, scoreEst: idx 16, statusRefinamento: idx ???
// ═════════════════════════════════════════════════════════════════════════════════

let ROWS=[], K=null, activeTab='visao';
let charts={};

// ── LOAD ────────────────────────────────────────────────────────
function loadData(){
  const btn=document.getElementById('btn-ref');
  btn.classList.add('spinning');
  const old=document.getElementById('jsonp-s');
  if(old)old.remove();
  const to=setTimeout(()=>{btn.classList.remove('spinning');showErr("Tempo esgotado.");},15000);

  window.__pmoCB=function(json){
    clearTimeout(to);btn.classList.remove('spinning');

    if(json.status==='ok'){
      ROWS=json.rows||[];
      ROWS.forEach(function(r){
        var proto=String(r[3]||'').trim(); if(!proto) return;
        var a=getAcompRec(proto);
        function sv(idx,field,isJson){
          var v=r[idx]; if(v===undefined||v===null||v==='') return;
          var s=String(v).trim(); if(!s) return;
          if(isJson){try{var parsed=JSON.parse(s);if(['sponsor','lider','vertical','historico'].indexOf(field)>=0){a[field]=Array.isArray(parsed)?parsed:[];}else{a[field]=parsed;}}catch(e){if(['sponsor','lider','vertical'].indexOf(field)>=0)a[field]=[];else a[field]=s;}}
          else if(field==='progresso'){a[field]=parseFloat(s)||0;}
          else if(['dtInicio','dtPrevista','dtPausa','dtRetomada','dtConclusao','dtCancelamento'].indexOf(field)>=0){var dtN=s;if(s.length>10&&s.indexOf('T')!==-1){dtN=s.substring(0,10);}else if(s.indexOf('/')!==-1){var pp=s.split('/');if(pp.length===3)dtN=pp[2].substring(0,4)+'-'+pp[1].padStart(2,'0')+'-'+pp[0].padStart(2,'0');}a[field]=dtN;}
          else{a[field]=s;}
        }
        sv(122,'status');sv(123,'fase');sv(124,'progresso');sv(125,'sponsor',true);sv(126,'lider',true);sv(127,'pmp');sv(128,'vertical',true);sv(129,'dtInicio');sv(130,'dtPrevista');sv(131,'dtPausa');sv(132,'dtRetomada');sv(133,'dtConclusao');sv(134,'dtCancelamento');sv(135,'historico',true);
        // Carregar objetivo do campo nomeado retornado pelo GAS (se disponível)
        if(r['objetivo']!==undefined&&r['objetivo']!==null){var _obj=String(r['objetivo']).trim();if(_obj&&_obj.charAt(0)!=='[')a.objetivo=_obj;}
      });
      if(ROWS.length>0){
        var colCount = ROWS[0].length;

        if(colCount >= 104){
          // ✓ CENÁRIO C — mapeamento verificado contra planilha real (122 colunas)
          // col 101(idx100)=Status Deliberação   col 102(idx101)=Obs. Deliberação
          // col 103(idx102)=Data Deliberação     col 104(idx103)=Status Refinamento
          // col 105(idx104)=Percentual Refin.    col 106(idx105)=Líder TAP
          // col 107(idx106)=Justificativa(TAP)   col 108(idx107)=Investimento Refinado
          // col 109(idx108)=Retorno Mensal Ref.  col 110(idx109)=Duração Benefício
          // col 111(idx110)=Benefícios Detalhados col 112(idx111)=Possui Business Plan
          // col 113(idx112)=BP Enviado ao PMO    col 114(idx113)=In-Scope (TAP)
          // col 115(idx114)=Out-of-Scope (TAP)   col 116(idx115)=Milestones (TAP)
          // col 117(idx116)=Pessoas/Dedicação    col 118(idx117)=Infraestrutura (TAP)
          // col 119(idx118)=Premissas (TAP)      col 120(idx119)=Restrições (TAP)
          // col 121(idx120)=Riscos (TAP)         col 122(idx121)=Critérios de Sucesso
          C = {
            id:0, dataHora:1, nome:2, protocolo:3, dataSolic:4, area:5, categoria:6, tipoBeneficio:7,
            gestor:8, resp:9, classBy:10,
            investimento:11, receita:12, payback:13, desc:14, just:15,
            scoreEst:16, scoreObj:17, scoreFCS:18, scoreAve:19,
            nivelEst:22, enquadramento:23, scoreProj:24, scoreSust:25, triggers:26,
            resultado:28, escalonamento:29, acao:30,
            duracaoBeneficio:null,
            statusDelib:100,          // col 101
            obsDelib:101,             // col 102
            dataDelib:102,            // col 103
            statusRefinamento:103,    // col 104
            percentualRefinamento:104,// col 105
            tapLider:105,             // col 106
            tapJustificativa:106,     // col 107
            tapInvestimento:107,      // col 108
            tapReceita:108,           // col 109
            tapDuracao:109,           // col 110
            tapBeneficios:110,        // col 111
            tapHasBP:111,             // col 112
            tapSentBP:112,            // col 113
            tapInScope:113,           // col 114
            tapOutScope:114,          // col 115

// ── KPIs calculados no cliente ───────────────────────────────────
function calcKPIs(rows){
  const total=rows.length;
  if(!total) return null;
  const enq={projeto:0,sustentacao:0,melhoria:0,pmo:0};
  const niv={maxima:0,alta:0,media:0,baixa:0};
  let scoreSum=0,scoreCount=0,escalTotal=0,prioritarias=0,bloqueadas=0,avalPMO=0;
  const areaMap={},evolMap={};

  rows.forEach(r=>{
    const e=String(r[C.enquadramento]||'').toLowerCase();
    if(e.includes('projeto'))enq.projeto++;
    else if(e.includes('sustent'))enq.sustentacao++;
    else if(e.includes('melhoria'))enq.melhoria++;
    else enq.pmo++;

    const n=String(r[C.nivelEst]||'').toLowerCase();
    if(n.includes('máxima')||n.includes('maxima'))niv.maxima++;
    else if(n.includes('alta'))niv.alta++;
    else if(n.includes('média')||n.includes('media'))niv.media++;
    else niv.baixa++;

    const s=parseFloat(r[C.scoreEst])||0;
    if(s>0){scoreSum+=s;scoreCount++;}
    if(String(r[C.escalonamento]||'').toUpperCase()==='SIM')escalTotal++;
    if(n.includes('baixa'))bloqueadas++;
    if((n.includes('máxima')||n.includes('maxima'))&&e.includes('projeto'))prioritarias++;
    if(e.includes('avaliação')||e.includes('avaliacao'))avalPMO++;

    const area=String(r[C.area]||'Não informada').trim();
    areaMap[area]=(areaMap[area]||0)+1;

    const dStr=String(r[C.dataHora]||r[1]||'');
    if(dStr && dStr.includes('/')){
      const dParts=dStr.split('/');
      if(dParts.length>=3){
        const yr=dParts[2].split(' ')[0].trim();
        const mo=dParts[1].trim().padStart(2,'0');
        if(yr && mo && !isNaN(Number(yr)) && !isNaN(Number(mo))){
          const k=yr+'-'+mo;
          evolMap[k]=(evolMap[k]||0)+1;
        }
      }
    }
  });

  const avg=col=>{const v=rows.map(r=>parseFloat(r[col])||0).filter(x=>x>0);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10:0;};
  const pct=(n,t)=>t>0?Math.round(n/t*100):0;
  const toN=v=>{if(!v)return 0;const s=String(v).toLowerCase();return s==='sim'?1:s==='par'||s==='parcial'?0.5:0;};
  const dimAvg=cols=>cols.map(ci=>Math.round(rows.map(r=>toN(r[ci])).reduce((a,b)=>a+b,0)/rows.length*100));

  const avgEst=scoreCount>0?Math.round(scoreSum/scoreCount*10)/10:0;
  const saude=Math.min(100,Math.max(0,Math.round((0.4*avgEst)+(0.3*pct(enq.projeto,total))-(0.2*pct(bloqueadas,total)))));
  const evolucao=Object.keys(evolMap).sort((a,b)=>a.localeCompare(b)).map(k=>({mes:k,count:evolMap[k]}));
  const mat={maxima:{projeto:0,melhoria:0,sustentacao:0,pmo:0},alta:{projeto:0,melhoria:0,sustentacao:0,pmo:0},media:{projeto:0,melhoria:0,sustentacao:0,pmo:0},baixa:{projeto:0,melhoria:0,sustentacao:0,pmo:0}};
  rows.forEach(r=>{
    const nk=String(r[C.nivelEst]||'').toLowerCase(),ek=String(r[C.enquadramento]||'').toLowerCase();
    const nKey=nk.includes('máxima')||nk.includes('maxima')?'maxima':nk.includes('alta')?'alta':nk.includes('média')||nk.includes('media')?'media':'baixa';
    const eKey=ek.includes('projeto')?'projeto':ek.includes('sustent')?'sustentacao':ek.includes('melhoria')?'melhoria':'pmo';
    mat[nKey][eKey]++;
  });

  // Financeiro
  let invTotal=0,recTotal=0,invCount=0,recCount=0;
  rows.forEach(r=>{
    const parseVal=v=>{if(v===null||v===undefined||v==='')return NaN;if(typeof v==='number')return v;let s=String(v).trim().replace(/R\$/gi,'').replace(/\s/g,'');if(s.includes(','))s=s.replace(/\./g,'').replace(',','.');return parseFloat(s);};
    const inv=parseVal(r[C.investimento]),rec=parseVal(r[C.receita]);
    if(!isNaN(inv)&&inv>0){invTotal+=inv;invCount++;}
    if(!isNaN(rec)&&rec>0){recTotal+=rec;recCount++;}
  });
  const roi=invTotal>0?Math.round((recTotal-invTotal)/invTotal*100):null;

  // Payback médio
  const paybackVals=rows.map(r=>parseFloat(r[C.payback])||0).filter(v=>v>0);
  const avgPayback=paybackVals.length>0?Math.round(paybackVals.reduce((a,b)=>a+b,0)/paybackVals.length):null;

  return {total,avgScoreEst:avgEst,escalTotal,escalPct:pct(escalTotal,total),
    bloqueadas,bloqueadasPct:pct(bloqueadas,total),prioritarias,prioritariasPct:pct(prioritarias,total),
    avalPMO,avalPMOPct:pct(avalPMO,total),saudePortfolio:saude,enq,niv,avgPayback,
    avgDims:{obj:avg(C.scoreObj),fcs:avg(C.scoreFCS),ave:avg(C.scoreAve),proj:avg(C.scoreProj),sust:avg(C.scoreSust)},
    // índices +2 vs legado (Categoria col7 + TipoBenefício col8 deslocam tudo)
    objScores:{names:['Expansão de Mercado','Receita e Rentabilidade','Excelência Operacional','Redução de Custos','Transformação Digital','Experiência do Cliente','Conformidade/ESG'],values:dimAvg([33,35,37,39,41,43,45])},
    fcsScores:{names:['Cap. Tecnológica','Gestão de Talentos','Parcerias','Conformidade Reg.','Dados e Inteligência','Gestão da Mudança'],values:dimAvg([47,49,51,53,55,57])},
    aveScores:{names:['Novo Mercado/Cliente','Upsell/Cross-sell','Redução de Custos','Ganho de Produtividade'],values:dimAvg([59,61,63,65])},
    projScores:{names:['Estratégia','Transformação','Complexidade','Impacto','Governança','Financeiro','Qualidade','Riscos','Sponsor','Mudança','Dependências','Esforço'],values:dimAvg([67,69,71,73,75,77,79,81,83,85,87,89])},
    sustScores:{names:['Recorrência','Cap. da Área','Escopo','Baixo Impacto','Prazo'],values:dimAvg([91,93,95,97,99])},
    matriz:mat,areaMap,evolucao,
    financeiro:{invTotal:Math.round(invTotal),recTotal:Math.round(recTotal),invCount,recCount,roi},
    avgPayback:(function(){var v=rows.map(r=>parseFloat(r[C.payback])||0).filter(v=>v>0);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null;})()};
}


// ── FORMAT CURRENCY ──────────────────────────────────────────────
function formatBRL(v) {
  if (v === null || v === undefined || v === '' || v === 0 || v === '0') return '—';
  var num;
  if (typeof v === 'number') {
    num = v;
  } else {
    var s = String(v).trim();
    s = s.replace(/R\$/gi,'').replace(/\s/g,'');
    if (s.includes(',')) s = s.replace(/\./g,'').replace(',','.');
    num = parseFloat(s);
  }
  if (isNaN(num) || num === 0) return '—';
  return 'R$ ' + num.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function parseTrgDate(v){
  if(!v)return null;
  var s=String(v).trim();
  if(s.includes('T')){var d=new Date(s);return isNaN(d)?null:d;}
  if(s.charAt(2)==='/'){var p=s.split('/');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
  if(s.charAt(4)==='-'){var p2=s.split('-');return new Date(parseInt(p2[0]),parseInt(p2[1])-1,parseInt(p2[2]));}
  return null;
}

  else if(t==='deliberacao')renderDeliberacao();
  else if(t==='refinamento')renderRefinamento();
  else if(t==='deliberacaoFinal')renderDeliberacaoFinal();
  else if(t==='portfolio')renderPortfolio();
  else if(t==='acompanhamento')renderAcompanhamento();
}

// ── DELIBERAÇÃO ──────────────────────────────────────────────────
var DELIB_LOCAL     = {};
var DELIB_FILTER    = 'pendente';
var DELIB_DATE_FROM = '';
var DELIB_DATE_TO   = '';

function getDelibStatus(r) {
  var proto = String(r[C.protocolo]||r[C.id]||'').trim();
  if (proto && DELIB_LOCAL[proto] && DELIB_LOCAL[proto].status) return DELIB_LOCAL[proto].status;
  var raw = (C.statusDelib !== null && C.statusDelib !== undefined) ? r[C.statusDelib] : undefined;
  if (raw === undefined || raw === null || raw === '') return 'PENDENTE';
  var v = String(raw).trim().toUpperCase();
  var known = ['APROVADO','DEVOLVIDO','REPROVADO','TAP_CONCLUIDO','EM_EXECUCAO'];
  return known.indexOf(v) !== -1 ? v : 'PENDENTE';
}

function getDelibData(r) {
  var proto = String(r[C.protocolo]||r[C.id]||'').trim();
  if (proto && DELIB_LOCAL[proto]) return DELIB_LOCAL[proto].data;
  return String(r[C.dataDelib]||'').trim();
}

function setDelibStatus(rowIdx, status, obs) {
  var r = ROWS[rowIdx];
  var proto = String(r[C.protocolo]||r[C.id]||'').trim();
  if (!proto) return;
  var now = new Date().toLocaleString('pt-BR');
  DELIB_LOCAL[proto] = { status: status, obs: obs||'', data: now };
  var cbName = '__dcb' + Date.now();
  var url = SHEET_URL
    + '?action=saveDelib'
    + '&protocolo='   + encodeURIComponent(proto)
    + '&statusDelib=' + encodeURIComponent(status)
    + '&obsDelib='    + encodeURIComponent(obs||'')
    + '&dataDelib='   + encodeURIComponent(now)
    + '&callback='    + cbName
    + '&t=' + Date.now();
  window[cbName] = function() { delete window[cbName]; };
  var s = document.createElement('script');
  s.src = url;
  document.head.appendChild(s);
  renderDeliberacao();
}

// Regra: filtro de datas NUNCA se aplica a pendentes (não têm data de decisão)
function getDelibFiltered() {
  return ROWS.map(function(r, i) { return {r:r, i:i}; }).filter(function(obj) {
    var r  = obj.r;
    var st = getDelibStatus(r);
    var isPendente = (st === 'PENDENTE');
    if (DELIB_FILTER !== 'todas') {
      if (DELIB_FILTER === 'pendente'  && !isPendente)        return false;
      if (DELIB_FILTER === 'aprovado'  && st !== 'APROVADO')  return false;
      if (DELIB_FILTER === 'devolvido' && st !== 'DEVOLVIDO') return false;
      if (DELIB_FILTER === 'reprovado' && st !== 'REPROVADO') return false;
    }
    if (!isPendente && (DELIB_DATE_FROM || DELIB_DATE_TO)) {
      var dt = getDelibData(r);
      if (!dt) return false;
      var d=null;var dtStr=String(dt).trim();var pS=dtStr.split(' ')[0].split('/');
      if(pS.length===3){d=new Date(parseInt(pS[2]),parseInt(pS[1])-1,parseInt(pS[0]));}
      else{var _pd=new Date(dtStr.replace(' ','T'));if(!isNaN(_pd.getTime()))d=_pd;}
      if (DELIB_DATE_FROM && d && d < new Date(DELIB_DATE_FROM)) return false;
      if (DELIB_DATE_TO) { var dTo = new Date(DELIB_DATE_TO); dTo.setHours(23,59,59); if (d && d > dTo) return false; }
    }
    return true;
  });
}

function exportDelibExcel() {
  var rows = getDelibFiltered();
  var BOM  = '\uFEFF';
  var hdrs = ['Protocolo','Iniciativa','Area','Gestor','Score','Nivel','Enquadramento',
              'Investimento','Receita Mensal','Payback (meses)','Status','Observacao','Data Decisao'];
  var lines = [hdrs.join(';')];
  rows.forEach(function(obj) {
    var r = obj.r;
    var proto = String(r[C.protocolo]||r[C.id]||'').trim();
    var obs = (DELIB_LOCAL[proto]||{}).obs || String(r[C.obsDelib]||'');
    lines.push([proto,
      '"'+String(r[C.nome]||'').replace(/"/g,'""')+'"',
      '"'+String(r[C.area]||'').replace(/"/g,'""')+'"',
      '"'+String(r[C.gestor]||'').replace(/"/g,'""')+'"',
      r[C.scoreEst]||'',
      String(r[C.nivelEst]||'').split('(')[0].trim(),
      r[C.enquadramento]||'',
      r[C.investimento]||'', r[C.receita]||'', r[C.payback]||'',
      getDelibStatus(r), '"'+obs.replace(/"/g,'""')+'"', getDelibData(r)
    ].join(';'));
  });
  var blob = new Blob([BOM+lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = 'Deliberacao_PMO_'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}

    +'<th>Payback</th><th>Status</th><th>Observacao</th><th>Data Decisao</th></tr></thead>'

  h += '<div class="dsbox"><div class="dsbox-num" style="color:var(--red)">'+counts.reprovado+'</div><div class="dsbox-lbl">Reprovadas</div></div>';
  h += '</div>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end">';
  h += '<div style="display:flex;gap:6px;flex-wrap:wrap" id="delib-filter-btns"></div>';
  h += '<div style="display:flex;gap:8px;align-items:flex-end;margin-left:auto">';
  h += '<div><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:3px">De</div>';
  h += '<input type="date" id="delib-from" value="'+DELIB_DATE_FROM+'" style="'+inpS+'"></div>';
  h += '<div><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:3px">Até</div>';
  h += '<input type="date" id="delib-to" value="'+DELIB_DATE_TO+'" style="'+inpS+'"></div>';
  h += '<button id="delib-clear" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font)">Limpar</button>';
  h += '</div></div>';
  h += '<div style="display:flex;gap:8px;margin-bottom:20px">';

  if (fromEl) fromEl.addEventListener('change', function() { DELIB_DATE_FROM = this.value; renderDeliberacao(); });
  if (toEl)   toEl.addEventListener('change',   function() { DELIB_DATE_TO   = this.value; renderDeliberacao(); });
  if (clrEl)  clrEl.addEventListener('click',   function() { DELIB_DATE_FROM=''; DELIB_DATE_TO=''; renderDeliberacao(); });
  // Export buttons
  var xlsEl = document.getElementById('delib-xls');
  var pdfEl = document.getElementById('delib-pdf');
  if (xlsEl) xlsEl.addEventListener('click', exportDelibExcel);

    'portf-escal':   {title:'Escalonamentos',            sub:'Aprovados que requerem escalonamento',   filter:function(r){return String(r[C.escalonamento]||'').toUpperCase()==='SIM';}},

}

// ── GRÁFICO EVOLUÇÃO PORTFÓLIO ────────────────────────────────────
function renderPortfEvolChart(approvedRows) {

    wrap.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:12px">Sem dados</div>';
    return;
  }
  var MP = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var mMap = {};
  approvedRows.forEach(function(r) {
    var raw = getDelibData(r)||String(r[C.dataSolic]||r[C.dataHora]||'');
    var s = String(raw).trim(), mo=null, yr=null;
    if (s.charAt(2)==='/') { var p=s.split('/'); mo=parseInt(p[1],10); yr=parseInt((p[2]||'').substring(0,4),10); }
    else if (s.charAt(4)==='-') { var p2=s.split('T')[0].split('-'); yr=parseInt(p2[0],10); mo=parseInt(p2[1],10); }
    if (mo&&yr&&mo>=1&&mo<=12&&yr>=2020&&yr<=2040) { var k=yr*100+mo; mMap[k]=(mMap[k]||0)+1; }
  });
  var keys=Object.keys(mMap).map(Number).sort(function(a,b){return a-b;});
  if (!keys.length) { wrap.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:12px">Sem dados de data</div>'; return; }
  var data=keys.map(function(k){return {label:MP[(k%100)-1]+'/'+String(Math.floor(k/100)).substring(2),count:mMap[k]};});
  var W=wrap.getBoundingClientRect().width||400;
  var H=190,pT=24,pR=12,pB=36,pL=36,cW=W-pL-pR,cH=H-pT-pB;
  var maxV=Math.max.apply(null,data.map(function(d){return d.count;}));
  var n=data.length,step=cW/n,barW=Math.min(40,Math.max(8,step-6));
  var svg='<svg width="'+W+'" height="'+H+'" style="display:block;overflow:visible">';
  for(var i=0;i<=4;i++){var v=Math.round(maxV*i/4),gy=pT+cH-(cH*i/4);svg+='<line x1="'+pL+'" y1="'+gy+'" x2="'+(W-pR)+'" y2="'+gy+'" stroke="rgba(0,0,0,.07)" stroke-width="1"/><text x="'+(pL-4)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="#6b7a99">'+v+'</text>';}
  data.forEach(function(d,i){var bh=maxV>0?Math.max(2,(d.count/maxV)*cH):2,x=pL+i*step+(step-barW)/2,by=pT+cH-bh;svg+='<rect x="'+x+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="3" fill="rgba(132,35,26,.8)"><title>'+d.label+': '+d.count+'</title></rect><text x="'+(x+barW/2)+'" y="'+(by-5)+'" text-anchor="middle" font-size="9" font-weight="700" fill="#84231a">'+d.count+'</text><text x="'+(x+barW/2)+'" y="'+(H-pB+14)+'" text-anchor="middle" font-size="8" fill="#6b7a99">'+d.label+'</text>';});
  svg+='</svg>';
  wrap.innerHTML=svg;
}


// ── VISÃO GERAL ──────────────────────────────────────────────────
let VIS_FILTER = {dateFrom:'', dateTo:'', area:'', enquadramento:'', tipoBeneficio:'', categoria:''};

function applyVisFilter(){
  var f = VIS_FILTER;
  var rows = ROWS.filter(function(r){
    if(f.dateFrom){
      var d=parseTrgDate(r[C.dataSolic]||r[C.dataHora]);
      if(!d||d<new Date(f.dateFrom))return false;
    }
    if(f.dateTo){
      var dt=new Date(f.dateTo);dt.setHours(23,59,59);
      var d=parseTrgDate(r[C.dataSolic]||r[C.dataHora]);
      if(!d||d>dt)return false;
    }
    if(f.area){
      if(String(r[C.area]||'').trim()!==f.area)return false;
    }
    if(f.enquadramento){
      var e=String(r[C.enquadramento]||'').toLowerCase();
      var fq=f.enquadramento.toLowerCase();
      if(!e.includes(fq))return false;
    }
    if(f.tipoBeneficio){
      if(String(r[C.tipoBeneficio]||'').toLowerCase()!==f.tipoBeneficio.toLowerCase())return false;
    }
    if(f.categoria){
      if(String(r[C.categoria]||'').toLowerCase()!==f.categoria.toLowerCase())return false;
    }
    return true;
  });
  return rows;
}

var renderVisaoDebounced = PMOUtils.debounce(function(){ renderVisao(); }, 250);

function renderVisao(){
  var f = VIS_FILTER;
  var filteredRows = applyVisFilter();
  var KV = (filteredRows.length === ROWS.length) ? K : (calcKPIs(filteredRows) || K);
  var isFiltered = filteredRows.length !== ROWS.length;

  // ── Acumulação Financeira — 3 frentes separadas ──────────────────────────────────
  // Helper: converte qualquer valor de célula para número float
  var parseVal = function(v) {
    if (v === null || v === undefined || v === '') return NaN;
    if (typeof v === 'number') return v;
    var s = String(v).trim().replace(/R\$/gi, '').replace(/\s/g, '');
    if (s.includes(',')) s = s.replace(/\./g, '').replace(',', '.');
    return parseFloat(s);
  };

  var CATS_PROD = ['crescimento / expansão', 'eficiência / produtividade']; // produtivas (retorno direto)

  // Card 1: Investimento em Expansão & Eficiência
  var invExpansao = 0, invExpansaoCount = 0;
  // Card 2: Retorno Total Projetado no Ciclo de Vida (receita × duração)
  var retornoCiclo = 0, retornoCicloCount = 0;
  // Card 3: Investimento em Estruturantes & Mandatórios
  var invEstruturante = 0, invEstruturanteCount = 0;

  filteredRows.forEach(function(r) {
    var cat = (C.categoria !== null && C.categoria !== undefined)
      ? String(r[C.categoria] || '').toLowerCase().trim() : '';
    var isProd = CATS_PROD.indexOf(cat) !== -1;
    var inv = parseVal(r[C.investimento]);

    if (isProd) {
      // Card 1 — acumula investimento produtivo
      if (!isNaN(inv) && inv > 0) { invExpansao += inv; invExpansaoCount++; }

      var dur = C.duracaoBeneficio !== null && C.duracaoBeneficio !== undefined

      // Fallback: se não há coluna de duração, usa 12 meses como base conservadora
      var durFinal = (!isNaN(dur) && dur > 0) ? dur : 12;
      if (!isNaN(rec) && rec > 0) {
        retornoCiclo += rec * durFinal;

// ── ALINHAMENTO ESTRATÉGICO ──────────────────────────────────────
function renderEstrategia(){
  var obj=K.objScores||{},fcs=K.fcsScores||{},ave=K.aveScores||{};
  var oV=obj.values||[],fV=fcs.values||[],aV=ave.values||[];
  var oN=obj.names||[],fN=fcs.names||[],aN=ave.names||[];
  var total=K.total||1;

  var avg=function(arr){return arr.length?Math.round(arr.reduce(function(a,b){return a+b;},0)/arr.length):0;};
  var avgObj=avg(oV),avgFcs=avg(fV),avgAve=avg(aV);
  var scoreGeral=Math.round(avgObj*0.45+avgFcs*0.30+avgAve*0.25);

  // Cor relativa ao max do grupo
  var relC=function(v,max){
    if(!max)return'#84231a';
    var p=v/max;
    return p>=0.67?'#16a34a':p>=0.34?'#d97706':'#84231a';
  };

  // Adiciona tooltips ao KPI_TOOLTIPS dinamicamente
  KPI_TOOLTIPS['est-score']   = 'Score ponderado de alinhamento estratégico do portfólio.\nFórmula: (Cobertura OBJ × 45%) + (Cobertura FCS × 30%) + (Cobertura AVE × 25%)\nInterpreta: % médio das iniciativas que contribuem para a agenda estratégica da empresa.';
  KPI_TOOLTIPS['est-obj']     = 'Objetivos Estratégicos — peso 45% no score geral.\nMede a proporção das iniciativas do portfólio que declarou contribuição (SIM ou Parcial) a cada um dos 7 objetivos estratégicos da empresa.\nAs barras são proporcionais ao item de maior cobertura do grupo.';
  KPI_TOOLTIPS['est-fcs']     = 'Fatores Críticos de Sucesso — peso 30% no score geral.\nMede a proporção das iniciativas do portfólio que declarou contribuição aos 6 FCS da empresa.\nFCS são as capacidades internas que o negócio precisa dominar para executar a estratégia.';
  KPI_TOOLTIPS['est-ave']     = 'Avenidas de Crescimento — peso 25% no score geral.\nMede a proporção das iniciativas que contribui para as 4 avenidas de crescimento definidas pela empresa.';
  KPI_TOOLTIPS['est-cobertura']= 'Radar de Perfil Estratégico: exibe a cobertura média de cada grupo (Objetivos, FCS, Avenidas) como um triângulo.\nQuanto mais próximo do centro, menor a cobertura do portfólio naquele grupo.\nUm triângulo equilibrado indica distribuição uniforme de esforço estratégico.\nOs valores são % das iniciativas que declararam contribuição a cada dimensão.';

  // Linha de item
  var itemRow=function(n,v,max){
    var pct=max>0?Math.round(v/max*100):0;
    var c=relC(v,max);

// ── REFINAMENTO — Backlog de Projetos Aprovados ────────────────────────────────────
function renderRefinamento() {
  // Projetos APROVADOS que ainda não concluíram o TAP
  // statusDelib = APROVADO AND statusRefinamento != TAP_CONCLUIDO/EM_EXECUCAO
  var refinamRows = ROWS.filter(function(r) {
    var st = getDelibStatus(r);
    if (st !== 'APROVADO') return false;
    // Se já tem TAP_CONCLUIDO ou EM_EXECUCAO em statusRefinamento, sai daqui
    if (C.statusRefinamento !== null && C.statusRefinamento !== undefined) {
      var sr = String(r[C.statusRefinamento]||'').toUpperCase().trim();
      if (sr === 'TAP_CONCLUIDO' || sr === 'EM_EXECUCAO') return false;
    }

    var categoria = (C.categoria!==null&&C.categoria!==undefined) ? String(r[C.categoria]||'—') : '—';
    var catColor = categoria.includes('Crescimento')?'#16a34a':categoria.includes('Eficiência')?'#84231a':categoria.includes('Estruturante')?'#84231a':'#d97706';

    var progColor = percentualRefinamento < 33 ? '#ef4444' : percentualRefinamento < 66 ? '#d97706' : '#84231a';
    
    h += '<div style="margin-bottom:20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer" onclick="openModal('+ROWS.indexOf(r)+')">';

// ── PROMOVER PARA EXECUÇÃO ─────────────────────────────────────────────────────────
window.promoverParaExecucao = function(protocolo, event) {
  if(event) event.stopPropagation();
  if (!confirm('Finalizar o refinamento deste projeto e movê-lo para a Esteira de Execução?\n\nEsta ação altera o status para EM_EXECUCAO.')) return;

  // Usa o mesmo padrão JSONP do dashboard (SHEET_URL com callback)
  var cbName = '__cbRefin_' + Date.now();
  window[cbName] = function(result) {
    delete window[cbName];
    var s = document.getElementById('s-'+cbName);
    if(s) s.remove();
    if(result && result.status === 'ok') {
      // Atualiza localmente para evitar reload completo
      ROWS.forEach(function(r) {
        var p = String(r[C.protocolo]||r[C.id]||'').trim();
        if(p === protocolo) {
          if(C.statusRefinamento!==null && C.statusRefinamento!==undefined) {
            r[C.statusRefinamento] = 'EM_EXECUCAO';
          }
          // Marca também no DELIB_LOCAL para uso imediato
          if(!DELIB_LOCAL[protocolo]) DELIB_LOCAL[protocolo] = {};
          DELIB_LOCAL[protocolo].statusRefinamento = 'EM_EXECUCAO';
        }
      });
      renderRefinamento();
      // Exibe feedback
      var fb = document.createElement('div');
      fb.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#84231a;color:white;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2)';
      fb.textContent = '✓ Projeto movido para Esteira de Execução!';
      document.body.appendChild(fb);
      setTimeout(function(){ fb.remove(); }, 3000);
    } else {
      alert('Erro ao atualizar status: ' + (result ? result.message : 'sem resposta do servidor'));
    }
  };
  var s = document.createElement('script');
  s.id = 's-'+cbName;
  s.src = SHEET_URL + '?action=updateStatusRefinamento&protocolo=' + encodeURIComponent(protocolo) + '&status=EM_EXECUCAO&callback=' + cbName + '&t=' + Date.now();
  document.body.appendChild(s);
};

// ── APROVAR PARA EXECUÇÃO ─────────────────────────────────────────────────────
window.aprovarParaExecucao = function(protocolo) {
  var btn = document.getElementById('delib-final-btn');
  var fb  = document.getElementById('delib-final-fb');
  var obs = document.getElementById('delib-final-obs') ? document.getElementById('delib-final-obs').value.trim() : '';

  if (btn) { btn.disabled = true; btn.textContent = '⏳ Processando...'; }

  var cbName = '__aprovCB_' + Date.now();
  window[cbName] = function(result) {
    delete window[cbName];
    var s = document.getElementById('s-'+cbName); if(s) s.remove();
    if (btn) { btn.disabled = false; btn.textContent = '💼 Aprovar para Execução'; }

    if (result && result.status === 'ok') {
      // Atualiza localmente
      ROWS.forEach(function(r) {
        var p = String(r[C.protocolo]||r[C.id]||'').trim();
        if (p === protocolo) {
          if (!DELIB_LOCAL[protocolo]) DELIB_LOCAL[protocolo] = {};
          DELIB_LOCAL[protocolo].status = 'EM_EXECUCAO';
          if (C.statusRefinamento !== null && C.statusRefinamento !== undefined) r[C.statusRefinamento] = 'EM_EXECUCAO';
        }
      });
      closeModalD();
      var toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#84231a;color:#fff;padding:13px 22px;border-radius:9px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2)';
      toast.textContent = '✅ Projeto aprovado para a Esteira de Execução!';
      document.body.appendChild(toast);
      setTimeout(function(){ toast.remove(); setTab('portfolio'); }, 2500);
    } else {
      if (fb) {
        fb.textContent = '❌ Erro: ' + (result ? result.message : 'sem resposta');
        fb.style.cssText = 'display:block;padding:8px 14px;border-radius:6px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;font-size:12px;font-weight:600';
      }
    }
  };

  var params = [
    'action=aprovarParaExecucao',
    'protocolo='  + encodeURIComponent(protocolo),
    'obs='        + encodeURIComponent(obs),
    'callback='   + cbName,
    't='          + Date.now()
  ].join('&');
  var s = document.createElement('script');
  s.id  = 's-' + cbName;
  s.src = SHEET_URL + '?' + params;
  document.body.appendChild(s);
};

// ── HELPER: Score numérico → Badge qualitativo de Alinhamento ────────────────────
function renderAlinhamentoBadge(scoreVal) {
  var s = parseFloat(scoreVal) || 0;
  if (s >= 75) return '<span class="badge badge-green">Alto</span>';
  if (s >= 50) return '<span class="badge badge-amber">Médio</span>';
  return '<span class="badge badge-red">Baixo</span>';
}

// ── TRIAGENS ─────────────────────────────────────────────────────
function renderTriagens(){
  if(!window.TRG_FILTER) window.TRG_FILTER={dateFrom:'',dateTo:'',search:''};

  function parseTrgD(v){
    if(!v)return null;
    var s=String(v).trim();
    if(s.includes('T')){var d=new Date(s);return isNaN(d)?null:d;}
    if(s.charAt(2)==='/'){var p=s.split('/');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
    if(s.charAt(4)==='-'){var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
    return null;
  }

  function fmtD(v){
    if(!v)return '—';var s=String(v);
    if(s.includes('T')){var d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('pt-BR');}
    if(s.charAt(2)==='/')return s.split(' ')[0];
    if(s.length>=10&&s.charAt(4)==='-'){var p=s.substring(0,10).split('-');return p[2]+'/'+p[1]+'/'+p[0];}
    return s;
  }

  function fmtM(v){ return formatBRL(v); }

  function getFiltered(){
    var f=window.TRG_FILTER;
    var r=[...ROWS].reverse();
    if(f.dateFrom){var from=new Date(f.dateFrom);r=r.filter(function(row){var d=parseTrgD(row[C.dataSolic]||row[C.dataHora]);return d&&d>=from;});}
    if(f.dateTo){var to=new Date(f.dateTo);to.setHours(23,59,59);r=r.filter(function(row){var d=parseTrgD(row[C.dataSolic]||row[C.dataHora]);return d&&d<=to;});}
    if(f.search){var q=f.search.toLowerCase();r=r.filter(function(row){return String(row[C.nome]||'').toLowerCase().includes(q)||String(row[C.area]||'').toLowerCase().includes(q)||String(row[C.protocolo]||'').toLowerCase().includes(q);});}
    return r;
  }

  window.buildTrgTable=function(){
    var filtered=getFiltered();
    var cnt=document.getElementById('trg-count');
    if(cnt)cnt.textContent=filtered.length+' iniciativa'+(filtered.length!==1?'s':'');
    var tbody=document.getElementById('trg-tbody');
    if(!tbody)return;
    if(!filtered.length){tbody.innerHTML='<tr><td colspan="12" style="text-align:center;padding:32px;color:var(--dim)">Nenhuma triagem encontrada.</td></tr>';return;}
    tbody.innerHTML=filtered.map(function(r){
      var idx=ROWS.indexOf(r);
      var sEst=parseFloat(r[C.scoreEst])||0;
      var enq=r[C.enquadramento]||'—';
      var esc=String(r[C.escalonamento]||'').toUpperCase()==='SIM';
      var pb=r[C.payback]?r[C.payback]+' m':'—';
      var cat=(C.categoria!==null&&C.categoria!==undefined)?String(r[C.categoria]||'—'):'—';
      var catColor=cat.includes('Crescimento')?'#16a34a':cat.includes('Eficiência')?'#84231a':cat.includes('Estruturante')?'#84231a':'#d97706';
      return '<tr class="clk" onclick="openModal('+idx+')">'+
        '<td class="td-mono">'+(r[C.protocolo]||'—')+'</td>'+
        '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">'+(r[C.nome]||'—')+'</td>'+
        '<td><span style="font-size:10px;padding:3px 7px;border-radius:4px;background:'+catColor+'22;color:'+catColor+';font-weight:600">'+cat+'</span></td>'+
        '<td>'+renderAlinhamentoBadge(sEst)+'</td>'+
        '<td style="font-size:11px;font-weight:600;'+nivelSt(r[C.nivelEst])+'">'+(r[C.nivelEst]||'—').split('(')[0].trim()+'</td>'+
        '<td><span class="badge '+enqBadge(enq)+'">'+enq+'</span></td>'+
        '<td><span class="badge '+(esc?'b-sim':'b-nao')+'">'+(r[C.escalonamento]||'—')+'</span></td>'+
        '<td style="font-size:11px;color:var(--red);font-family:var(--mono);white-space:nowrap">'+fmtM(r[C.investimento])+'</td>'+
        '<td style="font-size:11px;color:var(--green);font-family:var(--mono);white-space:nowrap">'+fmtM(r[C.receita])+'</td>'+
        '<td style="font-size:11px;font-family:var(--mono);color:var(--red);white-space:nowrap">'+pb+'</td>'+
        (function(){var ds=getDelibStatus(r);var dc=ds==='APROVADO'?'background:rgba(132,35,26,.1);color:#84231a':ds==='TAP_CONCLUIDO'?'background:rgba(132,35,26,.15);color:#84231a':ds==='EM_EXECUCAO'?'background:rgba(132,35,26,.2);color:#84231a':ds==='DEVOLVIDO'?'background:rgba(217,119,6,.12);color:#b45309':ds==='REPROVADO'?'background:rgba(132,35,26,.1);color:#84231a':'background:rgba(176,184,204,.15);color:#6b7a99';var dl=ds==='APROVADO'?'Aprovado':ds==='TAP_CONCLUIDO'?'TAP Concluído':ds==='EM_EXECUCAO'?'Em Execução':ds==='DEVOLVIDO'?'Devolvido':ds==='REPROVADO'?'Reprovado':'Pendente';return '<td><span class="badge" style="'+dc+'">'+dl+'</span></td>';})()+
        '<td class="td-mono" style="font-size:10px">'+fmtD(r[C.dataSolic]||r[C.dataHora])+'</td>'+
        '</tr>';
    }).join('');
  };

  var f=window.TRG_FILTER;
  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">'+
    '<div><div class="section-label" style="margin-bottom:4px">Todas as Triagens</div>'+
    '<div id="trg-count" style="font-size:12px;color:var(--muted)"></div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">'+
    '<button onclick="exportTrgPDF()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">'+
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Exportar PDF</button>'+
    '<button onclick="exportTrgExcel()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">'+
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg> Exportar Excel</button>'+
    '</div></div>'+
    '<div class="panel" style="margin-bottom:14px;padding:14px 18px">'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">'+
    '<div><div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">De</div>'+
    '<input type="date" id="trg-from" value="'+f.dateFrom+'" onchange="window.TRG_FILTER.dateFrom=this.value;window.buildTrgTable()" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);color:var(--text);background:var(--surface2)"></div>'+
    '<div><div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Até</div>'+
    '<input type="date" id="trg-to" value="'+f.dateTo+'" onchange="window.TRG_FILTER.dateTo=this.value;window.buildTrgTable()" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);color:var(--text);background:var(--surface2)"></div>'+
    '<div style="flex:1;min-width:180px"><div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Buscar</div>'+
    '<input type="text" id="trg-search" value="'+f.search+'" placeholder="Nome, área ou protocolo..." oninput="window.TRG_FILTER.search=this.value;window.buildTrgTable()" style="width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);color:var(--text);background:var(--surface2)"></div>'+
    '<button onclick="window.TRG_FILTER={dateFrom:\'\',dateTo:\'\',search:\'\'};renderTriagens()" style="padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font)">Limpar</button>'+
    '</div></div>'+
    '<div class="panel"><div class="tbl-wrap">'+
    '<table class="main-tbl"><thead><tr>'+
    '<th>Protocolo</th><th>Iniciativa</th><th>Categoria</th><th>Alinhamento</th>'+
    '<th>Nível</th><th>Enquadramento</th><th>Escalonar</th>'+
    '<th>Investimento</th><th>Receita Mensal</th><th>Payback</th><th>Status</th><th>Data Solicitação</th>'+
    '</tr></thead><tbody id="trg-tbody"></tbody></table></div></div>';

  document.getElementById('main-content').innerHTML=html;
  window.buildTrgTable();

function exportTrgExcel() {
  const f = window.TRG_FILTER;
  const rows = [...ROWS].reverse().filter(r => {
    if(f.dateFrom){ const d=parseTrgDate(r[C.dataSolic]||r[C.dataHora]); if(!d||d<new Date(f.dateFrom))return false; }
    if(f.dateTo){ const dt=new Date(f.dateTo);dt.setHours(23,59,59); const d=parseTrgDate(r[C.dataSolic]||r[C.dataHora]); if(!d||d>dt)return false; }
    if(f.search){ const q=f.search.toLowerCase(); if(!String(r[C.nome]||'').toLowerCase().includes(q)&&!String(r[C.area]||'').toLowerCase().includes(q)&&!String(r[C.protocolo]||'').toLowerCase().includes(q))return false; }
    return true;
  });
  
  const headers = ['Protocolo','Iniciativa','Área','Score','Nível','Enquadramento','Escalonar','Investimento','Receita Mensal','Payback (meses)','Deliberação','Data Solicitação'];
  const csvRows = [headers, ...rows.map(r => [
    r[C.protocolo]||'',
    '"'+(r[C.nome]||'').replace(/"/g,'""')+'"',
    '"'+(r[C.area]||'').replace(/"/g,'""')+'"',
    r[C.scoreEst]||'',
    (r[C.nivelEst]||'').split('(')[0].trim(),
    r[C.enquadramento]||'',
    r[C.escalonamento]||'',
    r[C.investimento]||'',
    r[C.receita]||'',
    r[C.payback]||'',
    getDelibStatus(r),
    fmtTrgDate(r[C.dataSolic]||r[C.dataHora])
  ])];

  const csv = csvRows.map(r => r.join(';')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'PMO_Triagens_' + new Date().toISOString().substring(0,10) + '.csv';
  a.click();
}

function fmtTrgDate(v){
  if(!v) return '';
  const s=String(v);
  if(s.includes('T')){ const d=new Date(s); return isNaN(d)?s:d.toLocaleDateString('pt-BR'); }
  if(s.charAt(2)==='/') return s.split(' ')[0];
  if(s.length>=10&&s.charAt(4)==='-'){ const p=s.substring(0,10).split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
  return s;
}

// ── EVOLUÇÃO TEMPORAL ───────────────────────────────────────────
function renderEvolChart() {
  var wrap = document.getElementById('evol-chart-wrap');
  if (!wrap) { setTimeout(renderEvolChart, 300); return; }
  if (!ROWS || !ROWS.length) {
    wrap.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:12px">Sem dados</div>';
    return;
  }

  var MESES_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var monthMap = {};

  ROWS.forEach(function(r) {
    var raw = r[4] !== undefined && r[4] !== null && r[4] !== '' ? r[4] : r[1];
    var s = String(raw || '').trim();
    var mo = null, yr = null;

    if (s.charAt(2) === '/') {
      var p = s.split('/');
      mo = parseInt(p[1], 10);
      yr = parseInt(p[2].substring(0, 4), 10);
    } else if (s.charAt(4) === '-') {
      var p2 = s.split('T')[0].split('-');
      yr = parseInt(p2[0], 10);
      mo = parseInt(p2[1], 10);
    } else if (s.includes('/')) {
      var p3 = s.split('/');
      if (p3.length >= 3) {
        mo = parseInt(p3[0], 10);
        yr = parseInt(p3[2].substring(0, 4), 10);
      }
    }

    if (mo && yr && mo >= 1 && mo <= 12 && yr >= 2020 && yr <= 2035) {
      var k = yr * 100 + mo;
      monthMap[k] = (monthMap[k] || 0) + 1;
    }
  });

  var keys = Object.keys(monthMap).map(Number).sort(function(a,b){return a-b;});

  if (!keys.length) {
    wrap.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:12px">Sem dados de data</div>';
    return;
  }

  var cum = 0;
  var data = keys.map(function(k) {
    var yr = Math.floor(k / 100);
    var mo = k % 100;
    cum += monthMap[k];
    return { label: MESES_PT[mo-1]+'/'+String(yr).substring(2), mensal: monthMap[k], cum: cum };
  });

  var W = wrap.getBoundingClientRect().width;
  if (!W || W < 50) W = (wrap.parentElement || {offsetWidth:400}).offsetWidth - 40 || 400;
  var H=190, pT=24, pR=12, pB=36, pL=36;
  var cW=W-pL-pR, cH=H-pT-pB;
  var maxV = data[data.length-1].cum;
  var n = data.length;
  var step = cW / n;
  var barW = Math.min(40, Math.max(8, step - 6));

  var svg = '<svg width="'+W+'" height="'+H+'" style="display:block;overflow:visible">';

  for (var i=0; i<=4; i++) {
    var v = Math.round(maxV * i / 4);
    var gy = pT + cH - (cH * i / 4);
    svg += '<line x1="'+pL+'" y1="'+gy+'" x2="'+(W-pR)+'" y2="'+gy+'" stroke="rgba(0,0,0,.07)" stroke-width="1"/>';
    svg += '<text x="'+(pL-4)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="#6b7a99" font-family="Poppins,sans-serif">'+v+'</text>';
  }

  data.forEach(function(d, i) {
    var bh = maxV > 0 ? Math.max(2, (d.cum/maxV)*cH) : 2;
    var x = pL + i*step + (step-barW)/2;
    var by = pT + cH - bh;
    var alpha = (0.35 + 0.65*(d.cum/maxV)).toFixed(2);
    svg += '<rect x="'+x+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="3" fill="rgba(132,35,26,'+alpha+')">';
    svg += '<title>'+d.label+': '+d.cum+' acumulado ('+d.mensal+' no mês)</title></rect>';
    svg += '<text x="'+(x+barW/2)+'" y="'+(by-5)+'" text-anchor="middle" font-size="9" font-weight="700" fill="#84231a" font-family="Poppins,sans-serif">'+d.cum+'</text>';
    var showLbl = n <= 12 || i === 0 || i === n-1 || i % Math.ceil(n/8) === 0;
    if (showLbl) {
      svg += '<text x="'+(x+barW/2)+'" y="'+(H-pB+14)+'" text-anchor="middle" font-size="8" fill="#6b7a99" font-family="Poppins,sans-serif">'+d.label+'</text>';
    }
  });

  svg += '</svg>';
  wrap.innerHTML = svg;
}

function showKpiTooltip(e, el) {
  var tip = document.getElementById('kpi-global-tooltip');
  if (!tip) return;
  var key = el.getAttribute('data-tip');
  var text = KPI_TOOLTIPS[key] || '';
  tip.innerHTML = text.replace(/\n/g, '<br>');
  tip.style.display = 'block';
  var rect = e.target.getBoundingClientRect();
  var tw = 240;
  var left = rect.right - tw;
  if (left < 8) left = 8;
  if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
  tip.style.left = left + 'px';
  requestAnimationFrame(function() {
    var h = tip.offsetHeight;
    var newTop = rect.top - h - 8;
    if (newTop < 8) newTop = rect.bottom + 8;
    tip.style.top = newTop + 'px';
  });
}

function hideKpiTooltip() {
  var tip = document.getElementById('kpi-global-tooltip');
  if (tip) tip.style.display = 'none';
}

function openFinModal(tipo) {
  var parseVal = function(v) {
    if (v === null || v === undefined || v === '') return NaN;
    if (typeof v === 'number') return v;
    var s = String(v).trim().replace(/R\$/g,'').replace(/\s/g,'');
    if (s.includes(',')) s = s.replace(/\./g,'').replace(',','.');
    return parseFloat(s);
  };
  var fmtBRL = formatBRL;

  var colIdx = tipo === 'investimento' ? C.investimento : C.receita;
  var color  = tipo === 'investimento' ? 'var(--red)' : 'var(--green)';
  var icon   = tipo === 'investimento' ? '💰' : '📈';
  var title  = tipo === 'investimento' ? 'Investimento Previsto por Iniciativa' : 'Receita Esperada por Iniciativa';

  var filtered = ROWS.filter(function(r) {
    var v = parseVal(r[colIdx]); return !isNaN(v) && v > 0;
  }).sort(function(a,b) { return parseVal(b[colIdx]) - parseVal(a[colIdx]); });

  var total = filtered.reduce(function(s,r){ return s + (parseVal(r[colIdx])||0); }, 0);

  document.getElementById('fin-modal-icon').textContent = icon;
  document.getElementById('fin-modal-title').textContent = title;
  document.getElementById('fin-modal-sub').textContent = filtered.length + ' iniciativa' + (filtered.length!==1?'s':'') + ' · Total: ' + fmtBRL(total);

  var maxVal = filtered.length ? parseVal(filtered[0][colIdx]) : 1;
  document.getElementById('fin-modal-body').innerHTML = !filtered.length
    ? '<div class="kpi-empty">Nenhuma iniciativa com valor preenchido.</div>'
    : filtered.map(function(r) {
        var idx2 = ROWS.indexOf(r);
        var val = parseVal(r[colIdx]) || 0;

          '<div style="width:'+barPct+'%;height:100%;background:'+color+';border-radius:2px"></div></div>' +
          '<div class="kpi-proj-meta"><span>📍 '+(r[C.area]||'—')+'</span>' +
          '<span style="color:'+sc(sEst)+'">Score: '+sEst+'/100</span>' +
          '<span class="badge '+enqBadge(r[C.enquadramento]||'')+'">'+( r[C.enquadramento]||'—')+'</span>' +
          '<span style="color:var(--dim)">'+pct2+'% do total</span></div>' +

      }).join('');

  document.getElementById('fin-modal-ov').classList.add('open');
  document.body.style.overflow = 'hidden';

// ── Obtém (ou cria) o estado de acompanhamento de um protocolo ────
function getAcompRec(proto) {
  if (!ACOMP_STATE[proto]) {
    ACOMP_STATE[proto] = {
      status:'', fase:'', progresso:0,
      sponsor:[], lider:[], pmp:'', vertical:[],
      dtInicio:'', dtPrevista:'',
      dtPausa:'', dtRetomada:'',
      dtConclusao:'', dtCancelamento:'',
      objetivo:'', historico:[]
    };
  }
  // garante campos novos em registros antigos
  var ensureArr=function(f){if(!Array.isArray(ACOMP_STATE[proto][f]))ACOMP_STATE[proto][f]=[];};
  ensureArr('sponsor');ensureArr('lider');ensureArr('vertical');
  if(!ACOMP_STATE[proto].pmp)ACOMP_STATE[proto].pmp='';
  // garante objetivo — carrega do localStorage se vazio
  if(!ACOMP_STATE[proto].objetivo){
    var _o=localStorage.getItem('pmo_obj_'+proto);
    if(_o)ACOMP_STATE[proto].objetivo=_o;
  }
  return ACOMP_STATE[proto];
}

// ── Cor do progresso ──────────────────────────────────────────────
function acProgColor(p) {
  return p >= 80 ? '#16a34a' : p >= 50 ? '#d97706' : p >= 20 ? '#ea580c' : '#b0b8cc';
}

// ── Filtra os projetos que estão na Esteira de Execução ───────────
function acGetExecRows() {
  if (!ROWS || !ROWS.length || !C || Object.keys(C).length === 0) return [];
  return ROWS.filter(function(r) {
    var proto = String(r[C.protocolo] || r[C.id] || '').trim();
    // 1) status marcado localmente nesta sessão
    if (proto && DELIB_LOCAL[proto] && (DELIB_LOCAL[proto].statusRefinamento === 'EM_EXECUCAO')) return true;
    // 2) coluna statusRefinamento na planilha
    if (C.statusRefinamento !== null && C.statusRefinamento !== undefined) {
      var sr = String(r[C.statusRefinamento] || '').toUpperCase().trim();
      if (sr === 'EM_EXECUCAO') return true;
    }
    // 3) coluna statusDelib na planilha
    if (C.statusDelib !== null && C.statusDelib !== undefined) {
      var sd = String(r[C.statusDelib] || '').toUpperCase().trim();
      if (sd === 'EM_EXECUCAO') return true;
    }
    return false;
  });
}

// ── Reconstrói legenda de um chart ───────────────────────────────
function acRebuildLeg(containerId, obj, colorMap) {
  var el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = Object.entries(obj).map(function(kv) {
    var legC=colorMap[kv[0]]||colorMap[(kv[0]||'').toUpperCase()]||'#b0b8cc';
    return '<span class="ac-leg-item">'
      + '<span class="ac-leg-dot" style="background:' + legC + '"></span>'
      + kv[0] + '&nbsp;<b>' + kv[1] + '</b></span>';
  }).join('');
}

// ── Atualiza KPIs e charts sem reconstruir a tabela ───────────────
function acRefresh() {
  var rows = acGetExecRows();
  var tot  = rows.length;
  if (!tot) return;
  var byStatus = {}, byEnq = {}, totProg = 0;
  rows.forEach(function(r) {
    var proto = String(r[C.protocolo] || r[C.id] || '').trim();
    var a  = getAcompRec(proto);
    var st = a.status || 'Não iniciado';
    var en = String(r[C.enquadramento] || '—');
    byStatus[st] = (byStatus[st] || 0) + 1;
    byEnq[en]    = (byEnq[en]    || 0) + 1;
    totProg += (a.progresso || 0);
  });
  var avgProg = Math.round(totProg / tot);

  // KPIs
  function upd(id, v) { var el = document.getElementById(id); if (el) el.textContent = v; }
  upd('ac-kpi-tot',  tot);
  upd('ac-kpi-and',  byStatus['Em andamento'] || 0);
  upd('ac-kpi-conc', byStatus['Concluído']    || 0);
  upd('ac-kpi-paus', byStatus['Pausado']       || 0);
  upd('ac-kpi-canc', byStatus['Cancelado']     || 0);
  upd('ac-kpi-prog', avgProg + '%');

  // Donut status
  var cst = ACOMP_CHARTS['k-st'];
  if (cst) {
    cst.data.labels = Object.keys(byStatus);
    cst.data.datasets[0].data = Object.values(byStatus);
    cst.data.datasets[0].backgroundColor = Object.keys(byStatus).map(function(k) {
      return ACOMP_STATUS_COLORS[k] || '#b0b8cc';
    });
    cst.update('none');
    acRebuildLeg('ac-leg-status', byStatus, ACOMP_STATUS_COLORS);
  }
  // Donut enquadramento
  var ceq = ACOMP_CHARTS['k-enq'];
  if (ceq) {
    ceq.data.labels = Object.keys(byEnq);
    ceq.data.datasets[0].data = Object.values(byEnq);
